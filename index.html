<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>改修ツリー完全版</title>

<style>
body { font-family: sans-serif; margin:0; }

header {
  background:#222;
  color:white;
  padding:10px;
}

#container {
  display:flex;
  height:85vh;
}

#left {
  width:280px;
  border-right:1px solid #ccc;
  overflow:auto;
  padding:10px;
}

#center {
  flex:1;
  padding:20px;
  overflow:auto;
}

.node {
  text-align:center;
  border-radius:8px;
  padding:10px;
  margin:20px auto;
  width:320px;
  color:white;
  position:relative;
}

.star0 { background:#2196f3; }
.star6 { background:#9c27b0; }
.star10{ background:#f44336; }

.line {
  width:2px;
  height:30px;
  background:#999;
  margin:auto;
}

.days span {
  margin:1px;
  padding:3px;
  font-size:10px;
}

.on { background:#4caf50; }
.off{ background:#ccc; }

#materials {
  border-top:2px solid #333;
  padding:10px;
}

.item { cursor:pointer; padding:5px; }
.item:hover { background:#eee; }

</style>
</head>

<body>

<header>
装備選択
<select id="category"></select>
<select id="equip"></select>

曜日
<span id="filter"></span>
</header>

<div id="container">
<div id="center"></div>
</div>

<div id="materials"><h3>素材合計</h3><div id="total"></div></div>

<script>

const DAYS=["日","月","火","水","木","金","土"];
let DAY_FILTER=[1,1,1,1,1,1,1];
let DATA;

// 曜日UI
DAYS.forEach((d,i)=>{
  const s=document.createElement("span");
  s.textContent=d;
  s.className="on";
  s.onclick=()=>{
    DAY_FILTER[i]=1-DAY_FILTER[i];
    s.className=DAY_FILTER[i]?"on":"off";
  };
  document.getElementById("filter").appendChild(s);
});

// JSON
fetch("kaisyu.json")
.then(r=>r.json())
.then(d=>{
  DATA=d;
  init();
});

function init(){

  const catSel=document.getElementById("category");
  const eqSel=document.getElementById("equip");

  // カテゴリ
  Object.keys(DATA).forEach(c=>{
    const opt=new Option(c,c);
    catSel.add(opt);
  });

  catSel.onchange=()=>{
    eqSel.innerHTML="";
    Object.keys(DATA[catSel.value]).forEach(n=>{
      const eq=DATA[catSel.value][n];
      if(eq.info["10"] && eq.info["10"].some(r=>r.result)){
        eqSel.add(new Option(n,n));
      }
    });
  };

  catSel.onchange();

  eqSel.onchange=()=>render(eqSel.value);
}

// 描画
function render(name){

  const eq=find(name);
  const container=document.getElementById("center");
  container.innerHTML="";
  total={};

  drawStage(container, name, eq.info["10"], "star10", true);
  line(container);
  drawStage(container, name, eq.info["6"], "star6");
  line(container);
  drawStage(container, name, eq.info["0"], "star0");

  renderTotal();
}

// レシピを統合
function mergeRecipes(list){

  const map={};

  list.forEach(r=>{
    const key=JSON.stringify({
      soubi:r.soubi,
      kaihatu:r.kaihatu,
      kaisyu:r.kaisyu
    });

    if(!map[key]){
      map[key]={...r, ship:[...r.ship]};
    }else{
      map[key].ship.push(...r.ship);
    }
  });

  return Object.values(map);
}

// ステージ描画
function drawStage(container, name, list, cls, isUpdate=false){

  if(!list) return;

  const merged=mergeRecipes(list);

  merged.forEach(r=>{

    if(!matchDay(r.youbi)) return;

    const div=document.createElement("div");
    div.className="node "+cls;

    let mats="";
    (r.soubi||[]).forEach(s=>{
      mats+=`${s[0]}×${s[1]} `;
      total[s[0]]=(total[s[0]]||0)+s[1];
    });

    div.innerHTML=`
      <b>${name}</b><br>
      艦: ${unique(r.ship).join(" / ")}<br>
      素材: ${mats}<br>
      ${isUpdate ? "→ "+r.result : ""}
      <div class="days">${days(r.youbi)}</div>
    `;

    container.appendChild(div);
  });
}

function line(container){
  const l=document.createElement("div");
  l.className="line";
  container.appendChild(l);
}

function days(arr){
  return arr.map((v,i)=>`<span class="${v?'on':'off'}">${DAYS[i]}</span>`).join("");
}

function matchDay(arr){
  return arr.some((v,i)=>v && DAY_FILTER[i]);
}

let total={};

function renderTotal(){
  document.getElementById("total").innerHTML=
  Object.entries(total)
  .map(([k,v])=>`${k} × ${v}`)
  .join("<br>");
}

function unique(arr){
  return Array.from(new Set(arr));
}

function find(name){
  for(const c in DATA){
    if(DATA[c][name]) return DATA[c][name];
  }
}

</script>
</body>
</html>
