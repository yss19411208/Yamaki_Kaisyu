<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>改修ルート最適UI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* ヘッダー */
header{
  padding:10px;
  background:#020617;
  display:flex;
  gap:10px;
}

/* メイン */
#main{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* ツリー */
.tree{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 各ノード */
.node{
  width:420px;
  background:#1e293b;
  border-radius:12px;
  padding:15px;
  margin:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.node h3{
  margin:0 0 10px 0;
}

/* 矢印 */
.arrow{
  font-size:24px;
}

/* 更新 */
.update{
  color:#facc15;
  font-weight:bold;
}

/* 合計 */
.summary{
  width:420px;
  background:#020617;
  margin-top:20px;
  padding:15px;
  border-radius:10px;
}
</style>

</head>

<body>

<header>
<select id="cat"></select>
<select id="eq"></select>
</header>

<div id="main"></div>
<div id="summary"></div>

<script>

let DATA;
let current;

// JSON
fetch("kaisyu.json").then(r=>r.json()).then(d=>{
  DATA=d;
  init();
});

function init(){

  const c=document.getElementById("cat");
  const e=document.getElementById("eq");

  Object.keys(DATA).forEach(k=>c.add(new Option(k,k)));

  c.onchange=()=>{
    e.innerHTML="";
    Object.keys(DATA[c.value]).forEach(n=>{
      let eq=DATA[c.value][n];
      if(eq.info["10"] && eq.info["10"].some(r=>r.result)){
        e.add(new Option(n,n));
      }
    });
  };

  c.onchange();

  e.onchange=()=>{
    current=e.value;
    render();
  };
}

/* 描画 */
function render(){

  const eq=find(current);
  const main=document.getElementById("main");
  main.innerHTML="";

  totalMat={};
  totalRes=[0,0,0,0];

  const tree=document.createElement("div");
  tree.className="tree";

  // 上から
  draw(tree, eq, "10", "★10 → 更新", true);
  arrow(tree);
  draw(tree, eq, "6", "★6 → ★9");
  arrow(tree);
  draw(tree, eq, "0", "★0 → ★5");

  main.appendChild(tree);

  renderSummary();
}

/* ステージ描画 */
function draw(root, eq, key, title, isUpdate=false){

  const list=merge(eq.info[key]);
  if(!list) return;

  list.forEach(r=>{

    const node=document.createElement("div");
    node.className="node";

    // 回数
    let count = 0;
    if(key==="0") count=6;
    if(key==="6") count=4;
    if(key==="10") count=1;

    // 素材
    let mats="";
    (r.soubi||[]).forEach(s=>{
      mats+=`${s[0]}×${s[1]*count} `;
      totalMat[s[0]]=(totalMat[s[0]]||0)+s[1]*count;
    });

    // 資源（回数分）
    let res = eq.resource.map(v=>v*count);
    res.forEach((v,i)=> totalRes[i]+=v);

    node.innerHTML=`
      <h3>${title}</h3>
      回数：${count}<br>
      艦：${uniq(r.ship)}<br>
      素材：${mats}<br>
      資源：${res.join(" / ")}<br>
      ${isUpdate && r.result ? `<div class="update">更新 → ${r.result}</div>`:""}
    `;

    root.appendChild(node);
  });
}

/* 矢印 */
function arrow(root){
  const a=document.createElement("div");
  a.className="arrow";
  a.textContent="↑";
  root.appendChild(a);
}

/* 合計 */
function renderSummary(){

  let m=Object.entries(totalMat)
    .map(([k,v])=>`${k} × ${v}`).join("<br>");

  let r=`
    燃料 ${totalRes[0]}<br>
    弾薬 ${totalRes[1]}<br>
    鋼材 ${totalRes[2]}<br>
    ボーキ ${totalRes[3]}
  `;

  document.getElementById("summary").innerHTML=`
    <div class="summary">
      <h3>合計</h3>
      <b>素材</b><br>${m}<br><br>
      <b>資源</b><br>${r}
    </div>
  `;
}

/* ユーティリティ */
function merge(list){
  if(!list) return;
  const m={};
  list.forEach(r=>{
    const k=JSON.stringify(r.soubi);
    if(!m[k]) m[k]={...r};
    else m[k].ship.push(...r.ship);
  });
  return Object.values(m);
}

function uniq(arr){
  return [...new Set(arr)].join(" / ");
}

function find(name){
  for(const c in DATA){
    if(DATA[c][name]) return DATA[c][name];
  }
}

</script>

</body>
</html>
