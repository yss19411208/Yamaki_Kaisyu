<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>改修更新ツリー</title>
<style>
/* ===== 変数 ===== */
:root{
  --bg:#08111e;--sf:#0d1828;--sf2:#132235;--sf3:#1a2e46;
  --bd:#1f3654;--bd2:#2d4d70;
  --tx:#b8d0e4;--mt:#456785;--wh:#d8eeff;
  --ac:#3a82c6;--gd:#c49230;--gn:#2e8f5a;--rd:#9e4848;--pp:#7058c0;
  --st:#c8a038;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP','Yu Gothic UI','Hiragino Sans',sans-serif;font-size:13px;line-height:1.5;overflow:hidden}

/* ===== アプリ骨格 ===== */
.app{display:flex;flex-direction:column;height:100vh}
.hdr{
  background:linear-gradient(to right,#07101d,var(--sf));
  border-bottom:1px solid var(--bd);padding:0 16px;
  display:flex;align-items:center;gap:10px;height:44px;flex-shrink:0;
}
.hdr-mark{
  width:26px;height:26px;background:var(--ac);border-radius:4px;
  color:#fff;font-weight:900;font-size:11px;letter-spacing:-.04em;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.hdr-title{font-size:14px;font-weight:700;color:var(--wh);letter-spacing:.02em}
.hdr-sep{flex:1}
.st-dot{width:7px;height:7px;border-radius:50%;background:var(--mt);transition:.3s;flex-shrink:0}
.st-dot.ok{background:var(--gn)}
.st-txt{font-size:11px;color:var(--mt)}

.body-wrap{display:flex;flex:1;overflow:hidden}

/* ===== サイドバー ===== */
.sidebar{
  width:276px;flex-shrink:0;background:var(--sf);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-sec{padding:9px 11px;border-bottom:1px solid var(--bd)}
.sb-lbl{display:block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--mt);margin-bottom:6px}
.day-btns{display:flex;gap:3px;flex-wrap:wrap}
.day-btn{
  padding:3px 7px;border-radius:3px;border:1px solid var(--bd);
  background:transparent;color:var(--mt);cursor:pointer;font-size:12px;
  font-family:inherit;transition:.12s;
}
.day-btn:hover{border-color:var(--ac);color:var(--ac)}
.day-btn.active{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:700}
.day-btn.active.d0,.day-btn.active.d6{background:#903030;border-color:#903030}
.srch{
  width:100%;padding:5px 9px;background:var(--sf2);
  border:1px solid var(--bd);border-radius:5px;color:var(--tx);
  font-size:13px;font-family:inherit;outline:none;transition:.12s;
}
.srch:focus{border-color:var(--ac)}
.cat-chips{display:flex;gap:3px;flex-wrap:wrap}
.cat-chip{
  padding:2px 7px;border-radius:10px;border:1px solid var(--bd);
  background:transparent;color:var(--mt);cursor:pointer;font-size:11px;
  font-family:inherit;transition:.12s;white-space:nowrap;
}
.cat-chip:hover{border-color:var(--ac);color:var(--ac)}
.cat-chip.active{background:var(--sf3);border-color:var(--ac);color:var(--ac)}

.eq-list{flex:1;overflow-y:auto;padding:4px 0}
.eq-list::-webkit-scrollbar{width:4px}
.eq-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.eq-grp-hdr{
  padding:3px 10px;font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  font-weight:700;color:var(--mt);background:var(--sf2);
}
.eq-item{
  padding:5px 9px;cursor:pointer;border-left:3px solid transparent;
  transition:.1s;display:flex;align-items:center;gap:8px;min-height:54px;
}
.eq-item:hover{background:var(--sf2);border-left-color:var(--ac)}
.eq-item.sel{background:rgba(58,130,198,.09);border-left-color:var(--gd)}
.eq-item.sel .eq-nm{color:var(--gd)}
.eq-nm{flex:1;line-height:1.35;font-size:12px}
.eq-arr{color:var(--mt);font-size:10px;flex-shrink:0}

/* ===== 画像ボックス（フォールバック付き） ===== */
.ib{
  flex-shrink:0;border-radius:5px;overflow:hidden;
  background:var(--sf3);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
}
.ib img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;display:block}
.ib .ib-fb{display:none;font-size:9px;color:var(--mt);text-align:center;line-height:1.3;padding:2px;word-break:break-all}
.ib.miss img{display:none}
.ib.miss .ib-fb{display:flex;align-items:center;justify-content:center;width:100%;height:100%}

/* ===== コンテンツエリア ===== */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ===== 読込・空・ロード ===== */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--mt);gap:10px;text-align:center;
}
.empty-ico{
  width:56px;height:56px;border:2px solid var(--bd);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:var(--bd);
}
.load-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px;
}
.load-box{
  background:var(--sf2);border:2px dashed var(--bd);border-radius:12px;
  padding:36px 52px;text-align:center;cursor:pointer;transition:.2s;max-width:400px;width:100%;
}
.load-box:hover{border-color:var(--ac)}
.load-ico{font-size:38px;font-weight:900;color:var(--ac);opacity:.4;margin-bottom:14px;letter-spacing:-.04em}
.load-box h2{font-size:15px;margin-bottom:8px;color:var(--wh)}
.load-box p{font-size:12px;color:var(--mt);margin-bottom:18px;line-height:1.6}
.load-btn{
  padding:8px 22px;background:var(--ac);border:none;border-radius:5px;
  color:#fff;font-size:13px;font-family:inherit;cursor:pointer;font-weight:700;
}
.load-hint{font-size:11px;color:var(--mt);text-align:center}

/* ===== ツリースクロール ===== */
.tree-scroll{flex:1;overflow-y:auto}
.tree-scroll::-webkit-scrollbar{width:6px}
.tree-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* ===== 目標装備カード ===== */
.tgt-card{
  border-bottom:2px solid var(--bd);
  background:linear-gradient(to right,#0a1c30,var(--sf));
  padding:16px 20px;display:flex;align-items:flex-start;gap:16px;flex-shrink:0;
}
.tgt-card .ib{width:88px;height:88px;border:2px solid var(--gn);background:rgba(0,0,0,.4)}
.tgt-card .ib .ib-fb{font-size:10px}
.tgt-badge{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--gn);margin-bottom:4px}
.tgt-name{font-size:18px;font-weight:700;color:#d8f0d8;line-height:1.3;margin-bottom:8px}
.tgt-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700}
.pill-ac{background:rgba(58,130,198,.14);border:1px solid rgba(58,130,198,.3);color:var(--ac)}
.pill-gd{background:rgba(196,146,48,.12);border:1px solid rgba(196,146,48,.3);color:var(--gd)}
.pill-gn{background:rgba(46,143,90,.12);border:1px solid rgba(46,143,90,.3);color:var(--gn)}

/* ===== 統計バー ===== */
.stats-bar{
  padding:10px 20px 12px;border-bottom:1px solid var(--bd);
  background:var(--sf2);flex-shrink:0;
}
.stats-bar-lbl{font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--mt);margin-bottom:6px}
.stat-cards{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.stat-c{background:var(--sf3);border:1px solid var(--bd);border-radius:5px;padding:5px 10px;min-width:100px}
.stat-c-lbl{font-size:9px;color:var(--mt);margin-bottom:2px}
.stat-c-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-row{margin-bottom:6px}
.stat-row-lbl{font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--mt);margin-bottom:4px}
.ship-tag{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(196,146,48,.1);border:1px solid rgba(196,146,48,.24);
  border-radius:3px;padding:1px 5px 1px 2px;font-size:11px;color:var(--gd);margin:2px;
}
.ship-tag img{width:22px;height:22px;object-fit:contain;border-radius:2px;flex-shrink:0}
.soubi-tags{display:flex;flex-wrap:wrap;gap:4px}
.soubi-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--sf3);border:1px solid var(--bd);
  border-radius:3px;padding:2px 6px;font-size:12px;
}
.soubi-tag img{width:18px;height:18px;object-fit:contain;image-rendering:pixelated;flex-shrink:0}
.soubi-tag .sq{color:var(--gd);font-weight:700}

/* ===== ルート/ソースブロック ===== */
.routes-wrap{padding:14px 20px;display:flex;flex-direction:column;gap:14px}
.route-block{border:1px solid var(--bd2);border-radius:10px;overflow:hidden}
.route-hdr{
  background:linear-gradient(to right,var(--sf2),var(--sf3));
  border-bottom:1px solid var(--bd);
  padding:10px 14px;display:flex;align-items:center;gap:12px;
}
.route-hdr .ib{width:68px;height:68px;flex-shrink:0;border:1px solid rgba(58,130,198,.3);background:rgba(0,0,0,.35)}
.route-hdr .ib .ib-fb{font-size:9px}
.route-info{flex:1;min-width:0}
.route-cat{font-size:10px;color:var(--mt);margin-bottom:1px}
.route-name{font-size:15px;font-weight:700;color:var(--ac);margin-bottom:3px}
.route-desc{font-size:11px;color:var(--mt)}
.route-res{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;align-items:center}
.route-badge{
  margin-left:auto;font-size:10px;color:var(--mt);
  background:var(--sf);border:1px solid var(--bd);border-radius:3px;padding:2px 7px;white-space:nowrap;
}

/* ===== ステップ ===== */
.steps-wrap{
  margin-left:10px;padding-left:18px;
  border-left:2px solid var(--bd);padding-top:8px;padding-bottom:2px;
}
.step-block{margin-bottom:8px;position:relative}
.step-block::before{
  content:'';position:absolute;left:-19px;top:16px;
  width:14px;height:2px;background:var(--bd);
}
.step-card{
  background:var(--sf2);border:1px solid var(--bd);
  border-radius:7px;overflow:hidden;transition:.12s;
}
.step-card:hover{border-color:var(--bd2)}
.step-hdr{
  padding:7px 12px;display:flex;align-items:center;gap:8px;
  cursor:pointer;background:var(--sf3);user-select:none;
}
.step-hdr.open .step-tog{transform:rotate(90deg)}
.star-badge{
  background:var(--sf);border:1px solid var(--st);border-radius:3px;
  padding:2px 8px;font-size:11px;color:var(--st);font-weight:700;
  white-space:nowrap;font-variant-numeric:tabular-nums;
}
.times-badge{
  background:rgba(58,130,198,.12);border:1px solid rgba(58,130,198,.25);
  border-radius:3px;padding:2px 6px;font-size:10px;color:var(--ac);font-weight:700;white-space:nowrap;
}
.warn-badge{font-size:10px;color:var(--rd)}
.step-tog{margin-left:auto;color:var(--mt);font-size:10px;transition:.2s;flex-shrink:0}
.step-body{padding:10px 12px;display:none;border-top:1px solid var(--bd)}
.step-body.open{display:block}

/* 枝分かれ */
.branches{}
.branch-item{padding-left:16px;margin-bottom:5px;position:relative}
.branch-item::before{content:'';position:absolute;left:0;top:17px;width:12px;height:2px;background:var(--bd)}
.branch-or{padding:3px 3px 3px 16px;font-size:10px;color:var(--mt)}
.recipe-card{background:var(--sf);border:1px solid var(--bd);border-radius:5px;padding:8px 10px}
.recipe-card.dim{opacity:.42}

/* 情報行 */
.irow{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.ilbl{font-size:10px;color:var(--mt);min-width:54px;font-weight:700;flex-shrink:0;padding-top:1px}
.ival{font-size:12px;color:var(--tx)}

/* 曜日ピル */
.dpill{display:inline-block;border-radius:2px;padding:2px 5px;font-size:10px;margin:1px;font-weight:700}
.dpill.on{background:rgba(58,130,198,.2);border:1px solid rgba(58,130,198,.4);color:var(--ac)}
.dpill.off{background:transparent;border:1px solid transparent;color:var(--mt)}
.dpill.wknd{background:rgba(158,72,72,.15);border-color:rgba(158,72,72,.35);color:#d07070}

/* 資源ボックス */
.rg{display:flex;gap:5px;flex-wrap:wrap}
.rb{text-align:center;background:var(--sf3);border:1px solid var(--bd);border-radius:4px;padding:4px 7px;min-width:54px}
.rb .rl{font-size:9px;color:var(--mt)}
.rb .rv{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.rb.fuel .rv{color:#5aaef0}.rb.ammo .rv{color:#e8d060}.rb.steel .rv{color:#70c070}
.rb.bauxite .rv{color:#e08860}.rb.dev .rv{color:#b080d8}.rb.impr .rv{color:#d898b8}
.rb.gld{border-color:var(--gd)}
.cum-row{margin-top:6px;padding-top:6px;border-top:1px solid var(--bd)}
.cum-lbl{font-size:9px;color:var(--mt);font-weight:700;margin-bottom:4px}

/* ===== 素材チップ（画像付き・展開ボタン付き） ===== */
.mat-entry{margin-bottom:4px}
.mat-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--sf2);border:1px solid var(--bd);
  border-radius:4px;padding:2px 7px 2px 3px;
  font-size:11px;vertical-align:middle;cursor:default;
}
.mat-img{width:24px;height:24px;object-fit:contain;image-rendering:pixelated;flex-shrink:0;background:rgba(0,0,0,.2);border-radius:2px}
.mat-nm{color:var(--tx)}
.mat-cnt{color:var(--gd);font-weight:700}
.mat-xpnd-btn{
  cursor:pointer;background:rgba(58,130,198,.14);border:1px solid rgba(58,130,198,.3);
  color:var(--ac);font-size:9px;padding:1px 5px;border-radius:2px;
  margin-left:3px;font-family:inherit;transition:.1s;white-space:nowrap;
}
.mat-xpnd-btn:hover{background:rgba(58,130,198,.28)}

/* 素材サブツリー */
.mat-st{
  margin:4px 0 0 8px;padding:8px 10px;padding-left:14px;
  border-left:2px solid var(--ac);
  background:rgba(58,130,198,.04);border-radius:0 5px 5px 0;
  display:none;
}
.mat-st.open{display:block}
.mat-st-title{
  font-size:10px;color:var(--ac);font-weight:700;margin-bottom:6px;
  padding:3px 6px;background:rgba(58,130,198,.1);border-radius:3px;display:inline-block;
}

/* サブルート */
.sub-route{background:var(--sf);border:1px solid var(--bd);border-radius:6px;margin-bottom:8px;overflow:hidden}
.sub-route-hdr{
  background:var(--sf2);padding:6px 10px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;
}
.sub-src-nm{font-size:12px;font-weight:700;color:var(--ac)}
.sub-src-cat{font-size:10px;color:var(--mt)}
.sub-body{padding:8px 10px}
.sub-step{
  margin-bottom:6px;padding-left:10px;
  border-left:2px solid var(--bd);
  padding-top:2px;padding-bottom:2px;
}
.sub-step-lbl{font-size:10px;color:var(--st);font-weight:700;margin-bottom:3px}

/* 深さ別カラー */
.dep1.mat-st{border-left-color:var(--gd)}
.dep1 .mat-st-title{color:var(--gd);background:rgba(196,146,48,.1)}
.dep2.mat-st{border-left-color:var(--gn)}
.dep2 .mat-st-title{color:var(--gn);background:rgba(46,143,90,.1)}
.dep3.mat-st{border-left-color:var(--pp)}
.dep3 .mat-st-title{color:var(--pp);background:rgba(112,88,192,.1)}

/* ===== 改修更新ブロック ===== */
.update-block{
  margin:8px 14px 12px;
  background:linear-gradient(to right,rgba(196,146,48,.08),rgba(196,146,48,.03));
  border:2px solid rgba(196,146,48,.4);border-radius:8px;padding:10px 14px;
}
.uc-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.uc-star{
  font-size:12px;font-weight:700;color:var(--gd);
  background:rgba(196,146,48,.14);border:1px solid rgba(196,146,48,.4);
  border-radius:3px;padding:2px 8px;
}
.uc-arrow{color:var(--gd);font-weight:900;font-size:14px}
.uc-result{display:flex;align-items:center;gap:8px}
.uc-result-img{width:34px;height:34px;object-fit:contain;image-rendering:pixelated;border-radius:3px;background:rgba(0,0,0,.3)}
.uc-result-nm{font-size:13px;font-weight:700;color:var(--gn)}
.uc-warn{font-size:10px;color:var(--rd)}

/* ===== 素材合計カード ===== */
.totals-card{
  margin:4px 14px 14px;background:var(--sf2);
  border:1px solid var(--bd);border-radius:7px;padding:10px 14px;
}
.totals-title{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
  color:var(--mt);margin-bottom:8px;
}
.totals-grid{display:flex;flex-wrap:wrap;gap:5px}
.total-item{
  display:flex;align-items:center;gap:4px;
  background:var(--sf3);border:1px solid var(--bd);border-radius:4px;padding:3px 8px;font-size:12px;
}
.total-item img{width:22px;height:22px;object-fit:contain;image-rendering:pixelated;flex-shrink:0}
.total-cnt{color:var(--gd);font-weight:700}

/* ===== 一致なし ===== */
.nomatch{
  padding:5px 10px;background:rgba(80,30,30,.3);
  border:1px solid rgba(158,72,72,.3);border-radius:3px;font-size:11px;color:#c08080;
}

/* ===== 深さ制限 ===== */
.depth-limit{font-size:10px;color:var(--mt);padding:4px 8px;font-style:italic}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="hdr">
    <div class="st-dot" id="stDot"></div>
    <div class="hdr-mark">改</div>
    <span class="hdr-title">改修更新ツリー</span>
    <span class="hdr-sep"></span>
    <span class="st-txt" id="stTxt">kaisyu.json を読み込んでいます...</span>
    <button class="day-btn" id="reloadBtn" style="display:none;margin-left:8px" onclick="showLoadUI()">再読込</button>
  </header>
  <div class="body-wrap" id="mainBody">
    <div class="load-wrap" id="loadScreen">
      <div class="load-box" onclick="document.getElementById('fileInput').click()"
           ondragover="event.preventDefault()" ondrop="handleDrop(event)">
        <div class="load-ico">JSON</div>
        <h2>kaisyu.json を読み込む</h2>
        <p>ここをクリックしてファイルを選択するか、<br>ドラッグ＆ドロップしてください</p>
        <button class="load-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">ファイルを選択</button>
        <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFile(this.files[0])">
      </div>
      <p class="load-hint">同ディレクトリに kaisyu.json がある場合は自動読み込みされます</p>
    </div>
  </div>
</div>

<script>
/* =====================================================
   グローバル状態
   ===================================================== */
const G = {
  data: null, lookup: {}, targets: new Map(), targetList: [],
  selected: null, dayFilter: -1, searchText: '', catFilter: '',
};

const DAYS      = ['日','月','火','水','木','金','土'];
const RES_NAMES = ['燃料','弾薬','鋼材','ボーキ'];
const RES_KEYS  = ['fuel','ammo','steel','bauxite'];

/* 素材サブツリー用グローバルキャッシュ */
let _mtCnt = 0;
const _mtCache = {};

/* =====================================================
   画像ヘルパー
   ===================================================== */
/* equipImgSrc:
   - 全角 + → 半角 +
   - 全角 / → ^
   - 砲[A-F] → chr(0x7832X)  ← Zip エンコーディングバグ対応
     例: 砲A (U+7832 + U+41) → zipが #U7832A と誤解釈 → U+7832A */
function equipImgSrc(name) {
  return 'image/item/' + name
    .replace(/＋/g, '+')
    .replace(/[／\/]/g, '^')
    .replace(/砲([A-Fa-f])/g, function(_,c){ return String.fromCodePoint(0x78320 + parseInt(c,16)); })
    + '.png';
}
function shipImgSrc(name){ return 'image/ship/' + name + '.png'; }

/* 画像ボックス（フォールバック付き）: onerror で .miss クラスを追加して代替テキスト表示 */
function mkIb(name, size, borderColor) {
  const src = equipImgSrc(name);
  const fb = esc(name.slice(0,6));
  const style = borderColor ? ` style="border-color:${borderColor}"` : '';
  return `<div class="ib" style="width:${size}px;height:${size}px"${style}>
    <img src="${src}" alt="${esc(name)}" loading="lazy"
      onerror="this.parentNode.classList.add('miss')">
    <div class="ib-fb">${fb}</div>
  </div>`;
}

/* 艦船タグ */
function shipTag(name) {
  const src = shipImgSrc(name);
  return `<span class="ship-tag">
    <img src="${src}" onerror="this.style.display='none'" loading="lazy" alt="${esc(name)}">
    ${esc(name)}
  </span>`;
}

/* =====================================================
   初期化・データ読込
   ===================================================== */
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const r = await fetch('./kaisyu.json');
    if (r.ok) { initData(await r.json()); return; }
  } catch(_) {}
  showLoadUI();
});

function showLoadUI() {
  const mb = document.getElementById('mainBody');
  const ls = document.getElementById('loadScreen');
  if (!mb.contains(ls)) { mb.innerHTML = ''; mb.appendChild(ls); }
  ls.style.display = '';
  document.getElementById('reloadBtn').style.display = 'block';
  setStatus('待機中', false);
}

function handleFile(file) {
  if (!file) return;
  setStatus('読み込み中...', false);
  const r = new FileReader();
  r.onload = e => {
    try { initData(JSON.parse(e.target.result)); }
    catch(err) { setStatus('JSON の解析に失敗しました', false); }
  };
  r.readAsText(file, 'UTF-8');
}

function handleDrop(e) {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
}

function setStatus(txt, ok) {
  document.getElementById('stTxt').textContent = txt;
  document.getElementById('stDot').className = 'st-dot' + (ok ? ' ok' : '');
}

function initData(json) {
  G.data = json; G.lookup = {}; G.targets = new Map();

  for (const [cat, equips] of Object.entries(json))
    for (const [name, equip] of Object.entries(equips))
      G.lookup[name] = { category: cat, equip };

  for (const [cat, equips] of Object.entries(json))
    for (const [name, equip] of Object.entries(equips))
      for (const item of (equip.info['10'] || []))
        if (item.result) {
          if (!G.targets.has(item.result)) G.targets.set(item.result, []);
          G.targets.get(item.result).push({ sourceName: name, sourceCategory: cat, equip, item });
        }

  G.targetList = Array.from(G.targets.keys()).sort();
  setStatus(`${G.targetList.length} 件の改修更新装備を読み込みました`, true);
  document.getElementById('reloadBtn').style.display = 'block';
  buildMainUI();
}

/* =====================================================

        <span class="sb-lbl">カテゴリ</span>

      </div>

function buildCatChips() {
  const cats = new Set();

/* ===== フィルター ===== */
function setDay(d) {
  G.dayFilter = d;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', +b.dataset.day===d));
  if (G.selected) renderTree(G.selected);
  renderEqList();
}
function setCat(cat) {
  G.catFilter = cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
  renderEqList();
}
function setSearch(txt) { G.searchText = txt.trim(); renderEqList(); }

/* =====================================================
   サイドバー 装備リスト描画
   ===================================================== */
function renderEqList() {
  const cont = document.getElementById('eqList');
  if (!cont) return;
  const { searchText, dayFilter, catFilter } = G;
  const grouped = {};

  for (const tgt of G.targetList) {
    const srcs = G.targets.get(tgt);
    if (!srcs) continue;
    const cats = srcs.map(s => s.sourceCategory);
    if (catFilter && !cats.includes(catFilter)) continue;
    if (searchText && !tgt.includes(searchText)) continue;
    if (dayFilter >= 0 && !srcs.some(s => s.item.youbi && s.item.youbi[dayFilter]===1)) continue;
    const dcat = catFilter || cats[0] || 'その他';
    if (!grouped[dcat]) grouped[dcat] = [];
    grouped[dcat].push(tgt);
  }

  let html = '';
  for (const [cat, items] of Object.entries(grouped).sort()) {
    html += `<div class="eq-grp-hdr">${esc(cat)}</div>`;
    for (const tgt of items) {
      const imgSrc = equipImgSrc(tgt);
      const sel = G.selected === tgt;
      html += `<div class="eq-item${sel?' sel':''}" onclick="selectTarget('${esc(tgt)}')">
        <div class="ib" style="width:48px;height:48px">
          <img src="${imgSrc}" alt="${esc(tgt)}" loading="lazy"
            onerror="this.parentNode.classList.add('miss')">
          <div class="ib-fb">${esc(tgt.slice(0,5))}</div>
        </div>
        <span class="eq-nm">${esc(tgt)}</span>
        <span class="eq-arr">›</span>
      </div>`;
    }
  }
  if (!html) html = `<div style="padding:16px;color:var(--mt);text-align:center;font-size:12px">該当する装備がありません</div>`;
  cont.innerHTML = html;
}

function selectTarget(name) {
  G.selected = name;
  renderEqList();
  renderTree(name);
}

/* =====================================================
   メインツリー描画
   ===================================================== */
function renderTree(targetName) {
  const content = document.getElementById('content');
  if (!content) return;

  /* 素材サブツリーキャッシュをリセット */
  _mtCnt = 0;
  Object.keys(_mtCache).forEach(k => delete _mtCache[k]);

  const sources = G.targets.get(targetName);
  if (!sources || !sources.length) {
    content.innerHTML = `<div class="empty"><div>データが見つかりません</div></div>`;
    return;
  }

  const primSrc = sources[0];
  const stats   = calcTotalCost(primSrc.equip, targetName);
  const allShips = collectAllShips(primSrc.equip, targetName);

  let html = '';

  /* --- 目標装備カード --- */
  html += `<div class="tgt-card">
    ${mkIb(targetName, 88, 'var(--gn)')}
    <div style="flex:1;min-width:0">
      <div class="tgt-badge">目標装備</div>
      <div class="tgt-name">${esc(targetName)}</div>
      <div class="tgt-tags">
        <span class="pill pill-ac">改修更新で入手</span>
        <span class="pill pill-gd">${esc(primSrc.sourceCategory)}</span>
        ${sources.length > 1 ? `<span class="pill pill-gn">入手ルート ${sources.length} 種</span>` : ''}
      </div>
    </div>
  </div>`;

  /* --- 統計バー --- */
  html += `<div class="stats-bar">
    <div class="stats-bar-lbl">総コスト概算（代表ルート: ${esc(primSrc.sourceName)}）</div>
    <div class="stat-cards">
      ${stats.res.map((v,i)=>v>0?`<div class="stat-c">
        <div class="stat-c-lbl">${RES_NAMES[i]}</div>
        <div class="stat-c-val" style="color:var(--${RES_KEYS[i]})">${v.toLocaleString()}</div>
      </div>`:'').join('')}
      <div class="stat-c">
        <div class="stat-c-lbl">開発資材</div>
        <div class="stat-c-val" style="color:#b080d8">${stats.devMin}〜${stats.devMax}</div>
      </div>
      <div class="stat-c">
        <div class="stat-c-lbl">改修資材</div>
        <div class="stat-c-val" style="color:#d898b8">${stats.impMin}〜${stats.impMax}</div>
      </div>
    </div>
    ${allShips.length ? `<div class="stat-row">
      <div class="stat-row-lbl">必要艦艇（代表ルート）</div>
      <div class="ship-tags">${allShips.map(s=>shipTag(s)).join('')}</div>
    </div>` : ''}
    <div class="stat-row-lbl" style="margin-top:6px;margin-bottom:4px">素材総計（★0 → 改修更新完了）</div>
    <div class="soubi-tags">
      ${Object.entries(stats.soubiTotals).map(([nm,cnt])=>`<span class="soubi-tag">
        <img src="${equipImgSrc(nm)}" onerror="this.style.display='none'" loading="lazy" alt="${esc(nm)}">
        <span class="sq">x${cnt}</span>${esc(nm)}
      </span>`).join('') || '<span style="color:var(--mt);font-size:11px">なし</span>'}
    </div>
  </div>`;

  /* --- ルートブロック群 --- */
  html += `<div class="tree-scroll"><div class="routes-wrap">`;
  for (let si = 0; si < sources.length; si++) {
    const { sourceName, sourceCategory, equip, item: updateItem } = sources[si];
    html += renderRouteBlock(sourceName, sourceCategory, equip, targetName, updateItem, si, sources.length);
  }
  html += `</div></div>`;

  content.innerHTML = html;
}

/* =====================================================
   ルートブロック（1ルート分）
   ===================================================== */
function renderRouteBlock(srcName, srcCat, equip, tgtName, updateItem, idx, total) {
  const stepKeys = Object.keys(equip.info).filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);

  /* ルートヘッダー */
  let html = `<div class="route-block"><div class="route-hdr">
    ${mkIb(srcName, 68)}
    <div class="route-info">
      <div class="route-cat">[${esc(srcCat)}]</div>
      <div class="route-name">${esc(srcName)}</div>
      <div class="route-desc">を ★10 まで改修 → 改修更新で入手</div>
      <div class="route-res">
        <span style="font-size:10px;color:var(--mt)">基礎資源(1回):</span>
        ${equip.resource.map((v,i)=>v>0?
          `<span style="font-size:11px"><span style="color:var(--mt)">${RES_NAMES[i]}</span> <b style="color:var(--wh)">${v}</b></span>`
        :'').join(' ') || '<span style="font-size:11px;color:var(--mt)">なし</span>'}
        ${total>1?`<span class="route-badge">ルート ${idx+1} / ${total}</span>`:''}
      </div>
    </div>
  </div>`;

  /* ステップ群 */
  html += `<div class="steps-wrap">`;
  let cumRes=[0,0,0,0], cumDev=[0,0], cumImp=[0,0];

  for (let ki=0; ki<stepKeys.length; ki++) {
    const keyNum  = stepKeys[ki];
    const nextKey = ki+1<stepKeys.length ? stepKeys[ki+1] : 10;
    const stepCnt = nextKey - keyNum;
    const items   = equip.info[String(keyNum)] || [];
    const filt    = filterForTarget(items, tgtName, G.dayFilter);
    const rep     = filt.length>0 ? filt[0] : (items[0]||null);

    if (rep) {
      cumRes = cumRes.map((v,i) => v + (equip.resource[i]||0)*stepCnt);
      cumDev[0] += rep.kaihatu[0]*stepCnt; cumDev[1] += rep.kaihatu[1]*stepCnt;
      cumImp[0] += rep.kaisyu[0]*stepCnt;  cumImp[1] += rep.kaisyu[1]*stepCnt;
    }

    const stepId = `step_${srcName}_${keyNum}_${idx}`.replace(/[^a-zA-Z0-9_]/g,'_');
    const hasDayMatch = filt.length > 0;
    const starLbl = keyNum===0 ? `★0 → ★${nextKey}（各 ${stepCnt} 回）` : `★${keyNum} → ★${nextKey}（${stepCnt} 回）`;

    html += `<div class="step-block"><div class="step-card">
      <div class="step-hdr open" onclick="toggleStep('${stepId}')">
        <span class="star-badge">${starLbl}</span>
        <span class="times-badge">x ${stepCnt} 回</span>
        ${!hasDayMatch&&G.dayFilter>=0?`<span class="warn-badge">選択曜日は実施不可</span>`:''}
        <span class="step-tog">▶</span>
      </div>
      <div class="step-body open" id="${stepId}">`;

    if (filt.length===0 && G.dayFilter>=0) {
      html += `<div class="nomatch">${DAYS[G.dayFilter]} 曜日では実施できる艦がいません</div>`;
      html += renderBranchTree(items, equip, stepCnt, cumRes, cumDev, cumImp, false);
    } else {
      html += renderBranchTree(filt.length>0?filt:items, equip, stepCnt, cumRes, cumDev, cumImp, true);
    }

    html += `</div></div></div>`;
  }

  /* 改修更新ブロック */
  html += renderUpdateBlock(updateItem, tgtName, srcName, equip, cumRes, cumDev, cumImp);

  /* 素材合計カード */
  html += renderTotalsCard(equip, tgtName, updateItem);

  html += `</div></div>`;
  return html;
}

/* =====================================================
   枝分かれレシピツリー
   ===================================================== */
function renderBranchTree(items, equip, stepCnt, cumRes, cumDev, cumImp, active) {
  if (!items||!items.length) return `<div class="nomatch">データなし</div>`;
  const multi = items.length > 1;
  let html = `<div class="branches">`;

  for (let i=0; i<items.length; i++) {
    const item = items[i];
    if (i>0) html += `<div class="branch-or">または</div>`;
    html += `<div class="branch-item"><div class="recipe-card${active?'':' dim'}">`;

    /* 必要艦艇 */
    html += `<div class="irow"><span class="ilbl">必要艦艇</span><span class="ival">
      ${item.ship&&item.ship.length?item.ship.map(s=>shipTag(s)).join(''):'<span style="color:var(--mt)">制限なし</span>'}
    </span></div>`;

    /* 曜日 */
    html += `<div class="irow"><span class="ilbl">曜日</span><span class="ival">${renderDays(item.youbi)}</span></div>`;

    /* 素材（展開ボタン付き） */
    html += `<div class="irow"><span class="ilbl">素材</span><div class="ival">`;
    if (item.soubi&&item.soubi.length) {
      for (const [nm,cnt] of item.soubi)
        html += renderMatEntry(nm, cnt, 0, new Set());
    } else {
      html += '<span style="color:var(--mt)">なし</span>';
    }
    html += `</div></div>`;

    /* 資源(1回) */
    const res = equip.resource;
    html += `<div class="irow"><span class="ilbl">資源(1回)</span><span class="ival"><div class="rg">
      ${res.map((v,i)=>v>0?`<div class="rb ${RES_KEYS[i]}"><div class="rl">${RES_NAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
      <div class="rb dev"><div class="rl">開発資材</div><div class="rv">${item.kaihatu[0]}〜${item.kaihatu[1]}</div></div>
      <div class="rb impr"><div class="rl">改修資材</div><div class="rv">${item.kaisyu[0]}〜${item.kaisyu[1]}</div></div>
    </div></span></div>`;

    /* 累計 */
    html += `<div class="cum-row"><div class="cum-lbl">累計（★0 → このステップ完了後）</div>
    <div class="rg">
      ${cumRes.map((v,i)=>v>0?`<div class="rb ${RES_KEYS[i]}"><div class="rl">${RES_NAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
      <div class="rb dev"><div class="rl">開発資材</div><div class="rv">${cumDev[0]}〜${cumDev[1]}</div></div>
      <div class="rb impr"><div class="rl">改修資材</div><div class="rv">${cumImp[0]}〜${cumImp[1]}</div></div>
    </div></div>`;

    html += `</div></div>`;
  }
  html += `</div>`;
  return html;
}

/* =====================================================
   素材エントリ（画像チップ + 展開ボタン + サブツリー）
   ===================================================== */
function renderMatEntry(matName, count, depth, visited) {
  const inVisited = visited.has(matName);
  const canExpand = !inVisited && depth < 4 && G.targets.has(matName);
  const panelId = 'mp' + (_mtCnt++);

  if (canExpand) {
    const nv = new Set(visited); nv.add(matName);
    _mtCache[panelId] = { name: matName, depth: depth+1, visited: nv };
  }

  const imgSrc = equipImgSrc(matName);
  const depCls = ['','dep1','dep2','dep3'][Math.min(depth,3)];

  let html = `<div class="mat-entry">
    <span class="mat-chip">
      <img class="mat-img" src="${imgSrc}" onerror="this.style.display='none'" loading="lazy" alt="${esc(matName)}">
      <span class="mat-nm">${esc(matName)}</span>
      <span class="mat-cnt"> x${count}</span>
      ${canExpand?`<button class="mat-xpnd-btn" onclick="toggleMatPanel('${panelId}',this)">ツリー表示</button>`:''}
    </span>`;

  if (canExpand) {
    html += `<div class="mat-st ${depCls}" id="${panelId}"></div>`;
  }

  html += `</div>`;
  return html;
}

/* サブツリートグル */
function toggleMatPanel(id, btn) {
  const panel = document.getElementById(id);
  if (!panel) return;
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    btn.textContent = 'ツリー表示';
    return;
  }
  if (!panel.innerHTML) {
    const c = _mtCache[id];
    if (c) panel.innerHTML = buildMatSubtreeHTML(c.name, c.depth, c.visited);
  }
  panel.classList.add('open');
  btn.textContent = 'ツリー閉じる';
}

/* 素材の改修更新ツリーHTMLを構築 */
function buildMatSubtreeHTML(name, depth, visited) {
  if (depth > 4)
    return `<div class="depth-limit">展開制限に達しました（最大4階層）</div>`;

  const sources = G.targets.get(name);
  if (!sources||!sources.length)
    return `<div class="nomatch">${esc(name)} は改修更新では入手できません</div>`;

  const nv = new Set(visited); nv.add(name);
  let html = `<div class="mat-st-title">${esc(name)} の改修更新入手ルート</div>`;

  for (let si=0; si<sources.length; si++) {
    const { sourceName, sourceCategory, equip, item: updateItem } = sources[si];
    html += buildSubRouteHTML(sourceName, sourceCategory, equip, name, updateItem, si, sources.length, depth, nv);
  }
  return html;
}

/* サブルートHTML（簡略版ルートブロック） */
function buildSubRouteHTML(srcName, srcCat, equip, tgtName, updateItem, idx, total, depth, visited) {
  const stepKeys = Object.keys(equip.info).filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);
  const imgSrc = equipImgSrc(srcName);

  let html = `<div class="sub-route">
    <div class="sub-route-hdr">
      <img width="36" height="36" src="${imgSrc}"
        onerror="this.style.display='none'"
        style="object-fit:contain;image-rendering:pixelated;border-radius:3px;background:rgba(0,0,0,.3);flex-shrink:0"
        loading="lazy" alt="${esc(srcName)}">
      <div>
        <div class="sub-src-cat">[${esc(srcCat)}]</div>
        <div class="sub-src-nm">${esc(srcName)}</div>
      </div>
      ${total>1?`<span class="route-badge" style="margin-left:auto">ルート${idx+1}/${total}</span>`:''}
    </div>
    <div class="sub-body">`;

  for (let ki=0; ki<stepKeys.length; ki++) {
    const keyNum  = stepKeys[ki];
    const nextKey = ki+1<stepKeys.length ? stepKeys[ki+1] : 10;
    const stepCnt = nextKey - keyNum;
    const items   = equip.info[String(keyNum)] || [];
    const rep     = items[0];
    if (!rep) continue;

    const starLbl = keyNum===0 ? `★0〜★${nextKey}（${stepCnt}回）` : `★${keyNum}〜★${nextKey}（${stepCnt}回）`;

    html += `<div class="sub-step">
      <div class="sub-step-lbl">${starLbl}</div>
      <div class="irow" style="margin-bottom:3px">
        <span class="ilbl">素材</span>
        <div>`;
    if (rep.soubi&&rep.soubi.length) {
      for (const [nm,cnt] of rep.soubi)
        html += renderMatEntry(nm, cnt*stepCnt, depth, visited);
    } else {
      html += '<span style="color:var(--mt);font-size:11px">なし</span>';
    }
    html += `</div></div>`;

    const res = equip.resource || [0,0,0,0];
    html += `<div class="irow">
      <span class="ilbl">資源</span>
      <div class="rg">
        ${res.map((v,i)=>v>0?`<div class="rb ${RES_KEYS[i]}"><div class="rl">${RES_NAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
        <div class="rb dev"><div class="rl">開発</div><div class="rv">${rep.kaihatu[0]}-${rep.kaihatu[1]}</div></div>
        <div class="rb impr"><div class="rl">改修</div><div class="rv">${rep.kaisyu[0]}-${rep.kaisyu[1]}</div></div>
      </div>
    </div>`;

    html += `</div>`;
  }

  /* 改修更新 */
  html += `<div class="sub-step" style="border-left-color:rgba(196,146,48,.5)">
    <div class="sub-step-lbl" style="color:var(--gd)">★10 改修更新 → ${esc(tgtName)}</div>
    <div class="irow">
      <span class="ilbl">更新素材</span>
      <div>`;
  if (updateItem.soubi&&updateItem.soubi.length) {
    for (const [nm,cnt] of updateItem.soubi)
      html += renderMatEntry(nm, cnt, depth, visited);
  } else {
    html += '<span style="color:var(--mt);font-size:11px">なし</span>';
  }
  html += `</div></div></div>`;

  html += `</div></div>`;
  return html;
}

/* =====================================================
   ★10 改修更新ブロック
   ===================================================== */
function renderUpdateBlock(updateItem, tgtName, srcName, equip, cumRes, cumDev, cumImp) {
  const dayOk = G.dayFilter<0 || (updateItem.youbi&&updateItem.youbi[G.dayFilter]===1);
  const fRes  = cumRes.map((v,i) => v+(equip.resource[i]||0));
  const fDev  = [cumDev[0]+updateItem.kaihatu[0], cumDev[1]+updateItem.kaihatu[1]];
  const fImp  = [cumImp[0]+updateItem.kaisyu[0],  cumImp[1]+updateItem.kaisyu[1]];
  const tgtSrc= equipImgSrc(tgtName);

  return `<div class="update-block" style="${dayOk||G.dayFilter<0?'':'opacity:.6'}">
    <div class="uc-hdr">
      <span class="uc-star">★10 改修更新</span>
      <span class="uc-arrow">→</span>
      <div class="uc-result">
        <img class="uc-result-img" src="${tgtSrc}" onerror="this.style.display='none'" alt="${esc(tgtName)}">
        <span class="uc-result-nm">${esc(tgtName)}</span>
      </div>
      ${!dayOk&&G.dayFilter>=0?`<span class="uc-warn">${DAYS[G.dayFilter]} 曜日は実施不可</span>`:''}
    </div>

    <div class="irow">
      <span class="ilbl">必要艦艇</span>
      <span>${updateItem.ship&&updateItem.ship.length?updateItem.ship.map(s=>shipTag(s)).join(''):'<span style="color:var(--mt)">制限なし</span>'}</span>
    </div>
    <div class="irow">
      <span class="ilbl">曜日</span>
      <span>${renderDays(updateItem.youbi)}</span>
    </div>
    <div class="irow">
      <span class="ilbl">更新素材</span>
      <div>${updateItem.soubi&&updateItem.soubi.length
        ? updateItem.soubi.map(([nm,cnt])=>renderMatEntry(nm,cnt,0,new Set())).join('')
        : '<span style="color:var(--mt)">なし</span>'
      }</div>
    </div>
    <div class="irow">
      <span class="ilbl">資材(更新)</span>
      <span><div class="rg">
        ${equip.resource.map((v,i)=>v>0?`<div class="rb ${RES_KEYS[i]}"><div class="rl">${RES_NAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
        <div class="rb dev"><div class="rl">開発資材</div><div class="rv">${updateItem.kaihatu[0]}〜${updateItem.kaihatu[1]}</div></div>
        <div class="rb impr"><div class="rl">改修資材</div><div class="rv">${updateItem.kaisyu[0]}〜${updateItem.kaisyu[1]}</div></div>
      </div></span>
    </div>

    <div class="cum-row">
      <div class="cum-lbl">総計（★0 → 改修更新完了まで全て込み）</div>
      <div class="rg">
        ${fRes.map((v,i)=>v>0?`<div class="rb ${RES_KEYS[i]} gld"><div class="rl">${RES_NAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
        <div class="rb dev gld"><div class="rl">開発資材</div><div class="rv">${fDev[0]}〜${fDev[1]}</div></div>
        <div class="rb impr gld"><div class="rl">改修資材</div><div class="rv">${fImp[0]}〜${fImp[1]}</div></div>
      </div>
    </div>
  </div>`;
}

/* =====================================================
   素材合計カード（樹形図最終アイテム数）
   ===================================================== */
function renderTotalsCard(equip, tgtName, updateItem) {
  const totals = {};
  const add = (nm, cnt) => { totals[nm] = (totals[nm]||0) + cnt; };

  const stepKeys = Object.keys(equip.info).filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);
  for (let ki=0; ki<stepKeys.length; ki++) {
    const keyNum  = stepKeys[ki];
    const nextKey = ki+1<stepKeys.length ? stepKeys[ki+1] : 10;
    const stepCnt = nextKey - keyNum;
    const items   = equip.info[String(keyNum)] || [];
    const rep     = items[0];
    if (rep) for (const [nm,cnt] of (rep.soubi||[])) add(nm, cnt*stepCnt);
  }
  for (const [nm,cnt] of (updateItem.soubi||[])) add(nm, cnt);

  if (!Object.keys(totals).length) return '';

  let html = `<div class="totals-card">
    <div class="totals-title">最終素材一覧（改修 ★0→★10 + 改修更新　合計）</div>
    <div class="totals-grid">`;
  for (const [nm, cnt] of Object.entries(totals).sort()) {
    const canUp = G.targets.has(nm);
    html += `<div class="total-item">
      <img src="${equipImgSrc(nm)}" onerror="this.style.display='none'" loading="lazy" alt="${esc(nm)}">
      <span>${esc(nm)}</span>
      <span class="total-cnt">x${cnt}</span>
      ${canUp?`<span style="font-size:9px;color:var(--ac);margin-left:3px">[改修更新可]</span>`:''}
    </div>`;
  }
  html += `</div></div>`;
  return html;
}

/* =====================================================
   統計計算
   ===================================================== */
function calcTotalCost(equip, tgtName) {
  const stepKeys = Object.keys(equip.info).filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);
  const res = equip.resource || [0,0,0,0];
  let totalRes=[0,0,0,0]; const soubiTotals={}; let dMin=0,dMax=0,iMin=0,iMax=0;

  for (let ki=0; ki<stepKeys.length; ki++) {
    const keyNum  = stepKeys[ki];
    const nextKey = ki+1<stepKeys.length ? stepKeys[ki+1] : 10;
    const cnt     = nextKey - keyNum;
    const items   = equip.info[String(keyNum)] || [];
    const rel     = filterForTarget(items, tgtName, -1);
    const item    = rel.length>0 ? rel[0] : (items[0]||null);
    totalRes = totalRes.map((v,i) => v + res[i]*cnt);
    if (item) {
      dMin += item.kaihatu[0]*cnt; dMax += item.kaihatu[1]*cnt;
      iMin += item.kaisyu[0]*cnt;  iMax += item.kaisyu[1]*cnt;
      for (const [sn,sc] of (item.soubi||[]))
        soubiTotals[sn] = (soubiTotals[sn]||0) + sc*cnt;
    }
  }
  for (const it of (equip.info['10']||[]).filter(it=>it.result===tgtName)) {
    totalRes = totalRes.map((v,i) => v+res[i]);
    dMin += it.kaihatu[0]; dMax += it.kaihatu[1];
    iMin += it.kaisyu[0];  iMax += it.kaisyu[1];
    for (const [sn,sc] of (it.soubi||[])) soubiTotals[sn]=(soubiTotals[sn]||0)+sc;
  }
  return { res:totalRes, soubiTotals, devMin:dMin, devMax:dMax, impMin:iMin, impMax:iMax };
}

function collectAllShips(equip, tgtName) {
  const ships = new Set();
  for (const [ks, items] of Object.entries(equip.info)) {
    for (const item of items) {
      if (ks==='10' && item.result!==tgtName) continue;
      if (item.result!==tgtName && item.result!==null && ks!=='10') continue;
      for (const s of (item.ship||[])) ships.add(s);
    }
  }
  return Array.from(ships);
}

/* =====================================================
   ステップ折りたたみ
   ===================================================== */
function toggleStep(id) {
  const el  = document.getElementById(id);
  const hdr = el ? el.previousElementSibling : null;
  if (!el) return;
  const open = el.classList.contains('open');
  el.classList.toggle('open', !open);
  if (hdr) hdr.classList.toggle('open', !open);
}

/* =====================================================
   ユーティリティ
   ===================================================== */
function filterForTarget(items, tgtName, dayIdx) {
  let f = items.filter(it => it.result===tgtName || it.result===null);
  if (!f.length) f = items;
  if (dayIdx>=0) f = f.filter(it => it.youbi && it.youbi[dayIdx]===1);
  return f;
}

function renderDays(youbi) {
  if (!youbi||youbi.length<7) return '<span style="color:var(--mt)">不明</span>';
  return DAYS.map((d,i) => {
    const on = youbi[i]===1, wknd = i===0||i===6;
    return `<span class="dpill ${on?'on':'off'} ${on&&wknd?'wknd':''}">${d}</span>`;
  }).join('');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
