<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>改修更新ツリー</title>
<style>
/* ======== 変数 ======== */
:root {
  --bg:#0b0f1a; --surface:#111827; --surface2:#1a2233; --surface3:#222d40;
  --border:#2a3a55; --text:#c8d6e8; --muted:#5a7090; --accent:#4fa3e0;
  --gold:#f0c040; --red:#e05050; --green:#50d090; --orange:#e08840;
  --star:#f0c040; --white:#e8f0ff;
  --branch-line:#2a3a55;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic UI',sans-serif;
  font-size:13px;min-height:100vh;overflow-x:hidden;
}

/* ======== レイアウト ======== */
.app{display:flex;flex-direction:column;height:100vh}
.header{
  background:linear-gradient(135deg,#0d1a2e,#1a2a44);
  border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.header h1{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.05em}
.header-icon{
  width:28px;height:28px;flex-shrink:0;
  background:linear-gradient(135deg,#1a3a5a,#0d2a44);
  border:1px solid var(--accent);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--accent);font-weight:900;letter-spacing:-.04em;
}
.header .sub{font-size:11px;color:var(--muted)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:.3s}
.status-dot.ok{background:var(--green)}
.body{display:flex;flex:1;overflow:hidden}

/* ======== サイドバー ======== */
.sidebar{
  width:300px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-section{padding:10px 12px;border-bottom:1px solid var(--border)}
.sidebar-section label{
  display:block;font-size:10px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:6px;font-weight:700;
}
.day-btns{display:flex;gap:4px;flex-wrap:wrap}
.day-btn{
  padding:4px 8px;border-radius:4px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:12px;
  font-family:inherit;transition:.15s;
}
.day-btn:hover{border-color:var(--accent);color:var(--accent)}
.day-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.day-btn.active.d0,.day-btn.active.d6{background:#c04040;border-color:#c04040}
.search-box{
  width:100%;padding:6px 10px;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;color:var(--text);
  font-size:13px;font-family:inherit;outline:none;transition:.15s;
}
.search-box:focus{border-color:var(--accent)}
.cat-chips{display:flex;gap:4px;flex-wrap:wrap}
.cat-chip{
  padding:3px 8px;border-radius:12px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:11px;
  font-family:inherit;transition:.15s;white-space:nowrap;
}
.cat-chip:hover{border-color:var(--accent);color:var(--accent)}
.cat-chip.active{background:var(--surface3);border-color:var(--accent);color:var(--accent)}

/* サイドバー 装備リスト */
.equip-list{flex:1;overflow-y:auto;padding:8px 0}
.equip-list::-webkit-scrollbar{width:4px}
.equip-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.equip-group{margin-bottom:4px}
.equip-group-header{
  padding:4px 12px;font-size:10px;color:var(--muted);
  text-transform:uppercase;font-weight:700;letter-spacing:.06em;background:var(--surface2);
}
.equip-item{
  padding:5px 10px;cursor:pointer;border-left:3px solid transparent;
  transition:.12s;display:flex;align-items:center;gap:8px;min-height:44px;
}
.equip-item:hover{background:var(--surface2);border-left-color:var(--accent)}
.equip-item.selected{background:rgba(79,163,224,.12);border-left-color:var(--gold);color:var(--gold)}
/* サイドバー装備画像 */
.equip-thumb{
  width:36px;height:36px;flex-shrink:0;object-fit:contain;
  image-rendering:pixelated;border-radius:3px;
}
.equip-thumb-placeholder{
  width:36px;height:36px;flex-shrink:0;
  background:var(--surface3);border:1px solid var(--border);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--muted);text-align:center;line-height:1.2;
  letter-spacing:0;
}
.equip-name{flex:1;line-height:1.3}
.equip-arrow{color:var(--muted);font-size:10px;flex-shrink:0}

/* ======== コンテンツエリア ======== */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ======== 統計バー ======== */
.stats-bar{
  background:var(--surface2);border-bottom:2px solid var(--border);
  padding:10px 16px;flex-shrink:0;
}
.stats-section-label{
  font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px;
  letter-spacing:.06em;
}
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:6px;margin-bottom:8px;
}
.stat-card{
  background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;
}
.stat-card-label{font-size:10px;color:var(--muted);margin-bottom:2px}
.stat-card-value{font-size:13px;font-weight:700;color:var(--white)}
.stat-card.accent .stat-card-value{color:var(--accent)}
.stat-card.gold .stat-card-value{color:var(--gold)}
.soubi-totals{display:flex;flex-wrap:wrap;gap:5px}
.soubi-tag{
  padding:3px 8px;background:var(--surface3);border:1px solid var(--border);
  border-radius:4px;font-size:12px;display:inline-flex;align-items:center;gap:5px;
}
.soubi-tag-img{width:18px;height:18px;object-fit:contain;image-rendering:pixelated;flex-shrink:0}
.soubi-tag .sq{color:var(--gold);font-weight:700}

/* ======== ツリー スクロールエリア ======== */
.tree-scroll{flex:1;overflow-y:auto;padding:16px}
.tree-scroll::-webkit-scrollbar{width:6px}
.tree-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ======== 空・ロード状態 ======== */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--muted);gap:10px;text-align:center;
}
.empty-icon{
  width:56px;height:56px;border:2px solid var(--border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:900;color:var(--border);opacity:.5;
}
.load-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:16px;
}
.load-box{
  background:var(--surface2);border:2px dashed var(--border);border-radius:12px;
  padding:32px 48px;text-align:center;cursor:pointer;transition:.2s;max-width:400px;width:100%;
}
.load-box:hover{border-color:var(--accent)}
.load-box h2{font-size:15px;margin-bottom:8px;color:var(--white)}
.load-box p{font-size:12px;color:var(--muted);margin-bottom:16px}
.load-btn{
  padding:8px 20px;background:var(--accent);border:none;border-radius:6px;
  color:#fff;font-size:13px;font-family:inherit;cursor:pointer;font-weight:700;
}
.load-hint{font-size:11px;color:var(--muted);text-align:center}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted)}

/* ======================================================
   ビジュアルツリー ノード
   ====================================================== */

/* 目標装備（ツリー頂上） */
.target-node{
  background:linear-gradient(135deg,#0d1f0d,#152510);
  border:2px solid var(--green);border-radius:12px;
  padding:14px 18px;margin-bottom:0;
  display:flex;align-items:center;gap:14px;
}
.target-node-img-wrap{
  width:80px;height:80px;flex-shrink:0;
  background:rgba(0,0,0,.4);border:1px solid rgba(80,208,144,.25);
  border-radius:8px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.target-node-img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.target-node-img-ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--muted);text-align:center;padding:4px;
}
.target-node-text .t-badge{
  font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--green);
  opacity:.7;text-transform:uppercase;margin-bottom:4px;
}
.target-node-text .t-name{font-size:17px;font-weight:700;color:var(--green);line-height:1.3}

/* ルート接続線（目標 → ソース） */
.routes-connector{
  margin-left:28px;padding-left:22px;
  border-left:2px solid var(--border);position:relative;
  padding-top:10px;
}
.routes-connector::before{
  content:'';position:absolute;left:-1px;top:0;
  width:22px;height:22px;
  border-bottom:2px solid var(--border);
}

/* ソースブロック */
.source-block{margin-bottom:14px}
.source-header{
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  border:1px solid var(--accent);border-radius:10px;
  padding:10px 14px;margin-bottom:0;
  display:flex;align-items:center;gap:12px;
}
.source-img-wrap{
  width:64px;height:64px;flex-shrink:0;
  background:rgba(0,0,0,.35);border:1px solid rgba(79,163,224,.2);
  border-radius:6px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.source-img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.source-img-ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--muted);text-align:center;padding:4px;line-height:1.3;
}
.source-text{flex:1;min-width:0}
.source-cat{font-size:10px;color:var(--muted);margin-bottom:2px}
.source-name{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:3px}
.source-desc{font-size:11px;color:var(--muted)}
.source-meta{
  margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
}
.route-badge{
  margin-left:auto;font-size:10px;color:var(--muted);
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:2px 7px;white-space:nowrap;
}

/* ステップコンテナ */
.steps-container{
  margin-left:10px;padding-left:20px;
  border-left:2px solid var(--border);
  padding-top:8px;
}
.step-block{margin-bottom:10px;position:relative}
.step-block::before{
  content:'';position:absolute;left:-21px;top:16px;
  width:16px;height:2px;background:var(--border);
}

/* ステップカード */
.step-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;transition:.15s;
}
.step-card:hover{border-color:var(--surface3)}
.step-header{
  padding:8px 12px;display:flex;align-items:center;gap:8px;
  cursor:pointer;background:var(--surface3);
}
.star-badge{
  background:var(--surface);border:1px solid var(--star);
  border-radius:4px;padding:2px 9px;
  font-size:11px;color:var(--star);font-weight:700;white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.times-badge{
  background:rgba(79,163,224,.15);border:1px solid rgba(79,163,224,.3);
  border-radius:4px;padding:2px 7px;
  font-size:10px;color:var(--accent);font-weight:700;white-space:nowrap;
}
.toggle{margin-left:auto;color:var(--muted);font-size:11px;transition:.2s;flex-shrink:0}
.step-header.open .toggle{transform:rotate(90deg)}
.step-body{padding:10px 12px;display:none;border-top:1px solid var(--border)}
.step-body.open{display:block}
.warn-label{font-size:10px;color:var(--red);white-space:nowrap}

/* ======================================================
   枝分かれ式レシピツリー
   ====================================================== */

/* 複数レシピを枝として表示するコンテナ */
.branch-tree{
  position:relative;
  padding-left:0;
  margin-top:4px;
}
/* 縦の幹（複数枝がある場合のみ意味を持つ） */
.branch-tree.multi-branch{
  padding-left:0;
}

/* 個々の枝 */
.branch-item{
  position:relative;
  padding-left:22px;
  margin-bottom:6px;
}
/* 横コネクタ（幹から枝へ） */
.branch-item::before{
  content:'';
  position:absolute;
  left:0;top:18px;
  width:18px;height:2px;
  background:var(--branch-line);
}

/* 「または」ラベル（枝と枝の間） */
.branch-or{
  position:relative;
  padding:4px 4px 4px 22px;
  font-size:10px;color:var(--muted);
  letter-spacing:.05em;
}
.branch-or::before{
  content:'';
  position:absolute;
  left:6px;top:0;bottom:0;
  width:2px;
  background:var(--branch-line);
}

/* レシピカード本体 */
.recipe-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:8px 10px;
}
.recipe-card.dimmed{opacity:.42}

/* 情報行 */
.info-row{display:flex;align-items:baseline;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.info-label{
  font-size:10px;color:var(--muted);min-width:58px;font-weight:700;
  flex-shrink:0;
}
.info-val{font-size:12px;color:var(--text)}

/* ======== 艦タグ（画像付き） ======== */
.ship-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.28);
  border-radius:4px;padding:1px 6px 1px 3px;
  font-size:11px;color:var(--gold);margin:2px;vertical-align:middle;
}
.ship-img-sm{
  width:26px;height:26px;object-fit:contain;
  border-radius:3px;flex-shrink:0;image-rendering:pixelated;
  background:rgba(0,0,0,.2);
}

/* ======== 曜日ピル ======== */
.day-pill{
  display:inline-block;border-radius:3px;padding:2px 5px;
  font-size:10px;margin:1px;font-weight:700;
}
.day-pill.on{background:rgba(79,163,224,.2);border:1px solid rgba(79,163,224,.4);color:var(--accent)}
.day-pill.off{background:transparent;border:1px solid transparent;color:var(--muted)}
.day-pill.on.weekend{background:rgba(192,64,64,.2);border-color:rgba(192,64,64,.4);color:#e07070}

/* ======== 素材リスト（画像付き） ======== */
.soubi-item{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:3px;padding:2px 7px 2px 4px;font-size:11px;margin:2px;
}
.soubi-img-xs{
  width:20px;height:20px;object-fit:contain;
  image-rendering:pixelated;flex-shrink:0;
  background:rgba(0,0,0,.2);border-radius:2px;
}
.eq-name{color:var(--text)}
.eq-count{color:var(--gold);font-weight:700}
.expand-btn{
  cursor:pointer;color:var(--accent);font-size:9px;margin-left:3px;
  border:none;background:none;padding:0;font-family:inherit;
  border-bottom:1px solid transparent;transition:.1s;
}
.expand-btn:hover{border-bottom-color:var(--accent)}

/* ======== 資源ボックス ======== */
.res-grid{display:flex;gap:6px;flex-wrap:wrap}
.res-box{
  text-align:center;background:var(--surface3);border:1px solid var(--border);
  border-radius:4px;padding:4px 8px;min-width:60px;
}
.res-box .res-label{font-size:9px;color:var(--muted)}
.res-box .res-val{font-size:13px;font-weight:700}
.res-box.fuel .res-val{color:#60b0f0}
.res-box.ammo .res-val{color:#e8d060}
.res-box.steel .res-val{color:#80c080}
.res-box.bauxite .res-val{color:#e09060}
.res-box.dev .res-val{color:#c090e0}
.res-box.impr .res-val{color:#e0a0c0}
.cum-row{margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.cum-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700}

/* ======== 改修更新カード ======== */
.update-card{
  background:linear-gradient(135deg,#1a1a2a,#1a2030);
  border:2px solid var(--gold);border-radius:8px;
  padding:12px 16px;margin-bottom:8px;
}
.uc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.uc-star{
  font-size:12px;font-weight:700;color:var(--gold);
  background:rgba(240,192,64,.15);border:1px solid rgba(240,192,64,.4);
  border-radius:4px;padding:2px 8px;white-space:nowrap;
}
.uc-arrow{color:var(--gold);font-size:16px;font-weight:900}
.uc-result-wrap{display:flex;align-items:center;gap:8px}
.uc-result-img{
  width:36px;height:36px;object-fit:contain;
  image-rendering:pixelated;
  border-radius:4px;background:rgba(0,0,0,.3);
}
.uc-result-name{font-size:13px;font-weight:700;color:var(--green)}
.update-warn{font-size:10px;color:var(--red);margin-left:4px}

/* ======== 一致なし ======== */
.nomatch{
  padding:6px 10px;background:rgba(80,40,40,.3);
  border:1px solid rgba(200,80,80,.3);border-radius:4px;
  font-size:11px;color:#c08080;text-align:center;
}

/* ======== 装備サブツリー（詳細ポップアップ） ======== */
.soubi-tree{margin:6px 0 0 16px;padding-left:12px;border-left:1px dashed var(--border)}
.soubi-tree-inner{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:8px;margin-top:4px;
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <div class="header-icon">改</div>
    <h1>改修更新ツリー</h1>
    <span class="sub" id="statusText">kaisyu.json を読み込んでいます…</span>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <button class="day-btn" id="reloadBtn" style="display:none" onclick="showLoadUI()">再読込</button>
    </div>
  </div>
  <div class="body" id="mainBody">
    <div class="load-screen" id="loadScreen">
      <div class="load-box" id="loadBox"
           onclick="document.getElementById('fileInput').click()"
           ondragover="event.preventDefault()" ondrop="handleDrop(event)">
        <div style="font-size:36px;font-weight:900;color:var(--accent);opacity:.4;margin-bottom:12px;letter-spacing:-.04em">JSON</div>
        <h2>kaisyu.json を読み込む</h2>
        <p>ここをクリックしてファイルを選択するか、<br>ドラッグ＆ドロップしてください</p>
        <button class="load-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">ファイルを選択</button>
        <input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFile(this.files[0])">
      </div>
      <p class="load-hint">同ディレクトリに kaisyu.json がある場合は自動読み込みされます</p>
    </div>
  </div>
</div>

<script>
/* ======================================================
   グローバル状態
   ====================================================== */
const G = {
  data: null,
  lookup: {},
  targets: new Map(),
  targetList: [],
  selected: null,
  dayFilter: -1,
  searchText: '',
  catFilter: '',
  expandedSteps: new Set(),
};

const DAYS     = ['日','月','火','水','木','金','土'];
const RES_NAMES = ['燃料','弾薬','鋼材','ボーキ'];
const RES_KEYS  = ['fuel','ammo','steel','bauxite'];

/* ======================================================
   画像パス生成
   - 全角記号を画像ファイル名の命名規則に合わせて変換
   - ＋(U+FF0B) → +(U+002B)
   - /(U+002F) または ／(U+FF0F) → ^(U+005E) ※KanColle wiki画像命名規則
   ====================================================== */
function equipImgSrc(name) {
  const normalized = name
    .replace(/＋/g, '+')   // 全角プラス → 半角
    .replace(/／/g, '^')   // 全角スラッシュ → キャレット
    .replace(/\//g, '^');  // 半角スラッシュ → キャレット
  return 'image/item/' + normalized + '.png';
}
function shipImgSrc(name) {
  return 'image/ship/' + name + '.png';
}

/* 装備画像タグ（HTMLインライン用）*/
function equipImgTag(name, cssClass) {
  const src = equipImgSrc(name);
  return `<img class="${cssClass}" src="${src}"
    onerror="this.style.display='none'" loading="lazy" alt="${esc(name)}">`;
}

/* 艦船タグ（画像 + 名前） */
function shipTag(name) {
  const src = shipImgSrc(name);
  return `<span class="ship-tag">
    <img class="ship-img-sm" src="${src}"
      onerror="this.style.display='none'" loading="lazy" alt="${esc(name)}">
    ${esc(name)}
  </span>`;
}

/* ======================================================
   初期化
   ====================================================== */
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const resp = await fetch('./kaisyu.json');
    if (resp.ok) { initData(await resp.json()); return; }
  } catch(e) {}
  showLoadUI();
});

function showLoadUI() {
  document.getElementById('loadScreen').style.display = '';
  const mb = document.getElementById('mainBody');
  if (!mb.contains(document.getElementById('loadScreen'))) {
    mb.innerHTML = '';
    mb.appendChild(document.getElementById('loadScreen'));
  }
  document.getElementById('reloadBtn').style.display = 'block';
  setStatus('待機中', false);
}

function handleFile(file) {
  if (!file) return;
  setStatus('読み込み中…', false);
  const reader = new FileReader();
  reader.onload = e => {
    try { initData(JSON.parse(e.target.result)); }
    catch(err) { setStatus('JSON の解析に失敗しました', false); }
  };
  reader.readAsText(file, 'UTF-8');
}

function handleDrop(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}

function setStatus(txt, ok) {
  document.getElementById('statusText').textContent = txt;
  document.getElementById('statusDot').className = 'status-dot' + (ok ? ' ok' : '');
}

function initData(json) {
  G.data = json;
  G.lookup = {};
  G.targets = new Map();

  for (const [cat, equips] of Object.entries(json)) {
    for (const [name, equip] of Object.entries(equips)) {
      G.lookup[name] = { category: cat, equip };
    }
  }

  for (const [cat, equips] of Object.entries(json)) {
    for (const [name, equip] of Object.entries(equips)) {
      for (const item of (equip.info['10'] || [])) {
        if (item.result) {
          if (!G.targets.has(item.result)) G.targets.set(item.result, []);
          G.targets.get(item.result).push({ sourceName: name, sourceCategory: cat, equip, item });
        }
      }
    }
  }

  G.targetList = Array.from(G.targets.keys()).sort();
  setStatus(`${G.targetList.length} 件の改修更新装備を読み込みました`, true);
  document.getElementById('reloadBtn').style.display = 'block';
  buildMainUI();
}

/* ======================================================
   メイン UI 構築
   ====================================================== */
function buildMainUI() {
  const mb = document.getElementById('mainBody');
  mb.innerHTML = `
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <label>曜日フィルター</label>
        <div class="day-btns">
          <button class="day-btn active" data-day="-1" onclick="setDay(-1)">全</button>
          ${DAYS.map((d,i)=>`<button class="day-btn d${i}" data-day="${i}" onclick="setDay(${i})">${d}</button>`).join('')}
        </div>
      </div>
      <div class="sidebar-section">
        <label>カテゴリ</label>
        <div class="cat-chips" id="catChips">
          <button class="cat-chip active" data-cat="" onclick="setCat('')">全て</button>
        </div>
      </div>
      <div class="sidebar-section">
        <label>装備名検索</label>
        <input class="search-box" type="text" placeholder="装備名を入力…" oninput="setSearch(this.value)">

    <main class="content" id="content">

      </div>

  `;
  buildCatChips();
  renderEquipList();
}

function buildCatChips() {
  const cats = new Set();
  for (const [,sources] of G.targets)
    for (const src of sources) cats.add(src.sourceCategory);
  const container = document.getElementById('catChips');
  Array.from(cats).sort().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip';
    btn.dataset.cat = cat;
    btn.textContent = cat.replace(/[主砲副砲]/g,'').replace('艦上','').replace('水上','') || cat.slice(0,4);
    btn.title = cat;
    btn.onclick = () => setCat(cat);
    container.appendChild(btn);
  });
}

function setDay(d) {
  G.dayFilter = d;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', +b.dataset.day === d));
  if (G.selected) renderTree(G.selected);
  renderEquipList();
}
function setCat(cat) {
  G.catFilter = cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderEquipList();
}
function setSearch(txt) {
  G.searchText = txt.trim();
  renderEquipList();
}

/* ======================================================
   サイドバー 装備リスト描画
   ====================================================== */
function renderEquipList() {
  const container = document.getElementById('equipList');
  if (!container) return;
  const { searchText, dayFilter, catFilter } = G;

  const grouped = {};
  for (const tgt of G.targetList) {
    const sources = G.targets.get(tgt);
    if (!sources) continue;
    const cats = sources.map(s => s.sourceCategory);
    if (catFilter && !cats.includes(catFilter)) continue;
    if (searchText && !tgt.includes(searchText)) continue;
    if (dayFilter >= 0 && !sources.some(s => s.item.youbi && s.item.youbi[dayFilter] === 1)) continue;
    const displayCat = catFilter || cats[0] || 'その他';
    if (!grouped[displayCat]) grouped[displayCat] = [];
    grouped[displayCat].push(tgt);
  }

  let html = '';
  for (const [cat, items] of Object.entries(grouped).sort()) {
    html += `<div class="equip-group">
      <div class="equip-group-header">${cat}</div>
      ${items.map(tgt => {
        const src = equipImgSrc(tgt);
        const sel = G.selected === tgt;
        return `<div class="equip-item ${sel?'selected':''}" onclick="selectTarget('${esc(tgt)}')">
          <img class="equip-thumb" src="${src}"
            onerror="this.outerHTML='<div class=\\'equip-thumb-placeholder\\'>${esc(tgt.slice(0,4))}</div>'"
            loading="lazy" alt="${esc(tgt)}">
          <span class="equip-name">${esc(tgt)}</span>
          <span class="equip-arrow">›</span>
        </div>`;
      }).join('')}
    </div>`;
  }
  if (!html) html = `<div style="padding:16px;color:var(--muted);text-align:center;font-size:12px">該当する装備がありません</div>`;
  container.innerHTML = html;
}

function selectTarget(name) {
  G.selected = name;
  G.expandedSteps = new Set();
  renderEquipList();
  renderTree(name);
}

/* ======================================================
   ツリー描画
   ====================================================== */
function renderTree(targetName) {
  const content = document.getElementById('content');
  if (!content) return;
  content.innerHTML = '<div class="loading">読み込み中…</div>';

  const sources = G.targets.get(targetName);
  if (!sources || !sources.length) {
    content.innerHTML = `<div class="empty-state"><div>データが見つかりません</div></div>`;
    return;
  }

  const primarySrc = sources[0];
  const stats     = calcTotalCost(primarySrc.equip, targetName, primarySrc.sourceName);
  const allShips  = collectAllShips(primarySrc.equip, targetName);

  let html = '';

  /* 統計バー */
  html += `<div class="stats-bar">
    <div class="stats-section-label">総コスト（★0 → ★10 改修更新まで）</div>
    <div class="stats-grid">
      <div class="stat-card gold">
        <div class="stat-card-label">元装備（代表ルート）</div>
        <div class="stat-card-value">${esc(primarySrc.sourceName)}</div>
      </div>
      ${stats.res.map((v,i)=>v>0?`
      <div class="stat-card">
        <div class="stat-card-label">${RES_NAMES[i]}</div>
        <div class="stat-card-value" style="color:var(--${RES_KEYS[i]})">${v.toLocaleString()}</div>
      </div>`:'').join('')}
      <div class="stat-card accent">
        <div class="stat-card-label">開発資材（計）</div>
        <div class="stat-card-value">${stats.devMin}〜${stats.devMax} 個</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">改修資材（計）</div>
        <div class="stat-card-value" style="color:#e0a0c0">${stats.impMin}〜${stats.impMax} 個</div>
      </div>
    </div>
    <div style="margin-bottom:6px;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em">必要艦艇</div>
    <div style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:2px">
      ${allShips.map(s=>shipTag(s)).join('') || '<span style="color:var(--muted);font-size:11px">制限なし</span>'}
    </div>
    <div style="margin-bottom:4px;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em">素材総計</div>
    <div class="soubi-totals">
      ${Object.entries(stats.soubiTotals).map(([name,count])=>`
      <span class="soubi-tag">
        <img class="soubi-tag-img" src="${equipImgSrc(name)}" onerror="this.style.display='none'" loading="lazy">
        <span class="sq">×${count}</span> ${esc(name)}
      </span>`).join('') || '<span style="color:var(--muted);font-size:11px">なし</span>'}
    </div>
  </div>`;

  /* ツリー本体 */
  html += `<div class="tree-scroll"><div id="treeInner">`;

  /* 目標装備ノード */
  const tgtSrc = equipImgSrc(targetName);
  html += `<div class="target-node">
    <div class="target-node-img-wrap">
      <img class="target-node-img" src="${tgtSrc}"
        onerror="this.outerHTML='<div class=\\'target-node-img-ph\\'>${esc(targetName.slice(0,8))}</div>'"
        alt="${esc(targetName)}">
    </div>
    <div class="target-node-text">
      <div class="t-badge">目標装備</div>
      <div class="t-name">${esc(targetName)}</div>
    </div>
  </div>`;

  /* 各ルート（複数元装備） */
  for (let si = 0; si < sources.length; si++) {
    const { sourceName, equip, item, sourceCategory } = sources[si];
    html += renderSourceBlock(sourceName, sourceCategory, equip, targetName, item, si, sources.length);
  }

  html += `</div></div>`;
  content.innerHTML = html;
}

/* ======================================================
   ソースブロック（1ルート分）
   ====================================================== */
function renderSourceBlock(sourceName, sourceCat, equip, targetName, updateItem, idx, total) {
  const stepKeys = Object.keys(equip.info)
    .filter(k => k !== '10').map(Number).sort((a,b) => a-b);

  let html = `<div class="routes-connector"><div class="source-block">`;

  /* ソースヘッダー（装備画像付き） */
  const srcImgSrc = equipImgSrc(sourceName);
  html += `<div class="source-header">
    <div class="source-img-wrap">
      <img class="source-img" src="${srcImgSrc}"
        onerror="this.outerHTML='<div class=\\'source-img-ph\\'>${esc(sourceName.slice(0,8))}</div>'"
        alt="${esc(sourceName)}">
    </div>
    <div class="source-text">
      <div class="source-cat">[${esc(sourceCat)}]</div>
      <div class="source-name">${esc(sourceName)}</div>
      <div class="source-desc">を ★10 まで改修 → 改修更新</div>
      <div class="source-meta">
        <span style="font-size:11px;color:var(--muted)">基礎資源（1回）:</span>
        ${equip.resource.map((v,i)=>v>0?
          `<span style="font-size:11px"><span style="color:var(--muted)">${RES_NAMES[i]}</span> <b style="color:var(--white)">${v}</b></span>`:''
        ).join(' ') || '<span style="font-size:11px;color:var(--muted)">なし</span>'}
        ${total > 1 ? `<span class="route-badge">ルート ${idx+1} / ${total}</span>` : ''}
      </div>
    </div>
  </div>`;

  /* ステップ群（枝分かれツリー） */
  html += `<div class="steps-container">`;
  let cumRes = [0,0,0,0];
  let cumDev = [0,0];
  let cumImp = [0,0];

  for (let ki = 0; ki < stepKeys.length; ki++) {
    const keyNum  = stepKeys[ki];
    const keyStr  = String(keyNum);
    const nextKey = ki+1 < stepKeys.length ? stepKeys[ki+1] : 10;
    const stepCount  = nextKey - keyNum;
    const items      = equip.info[keyStr] || [];
    const filtered   = filterItemsForTarget(items, targetName, G.dayFilter);

    /* 代表アイテムで累計を更新 */
    const repItem = filtered.length > 0 ? filtered[0] : (items[0] || null);
    if (repItem) {
      cumRes = cumRes.map((v,i) => v + (equip.resource[i]||0) * stepCount);
      cumDev[0] += repItem.kaihatu[0] * stepCount;
      cumDev[1] += repItem.kaihatu[1] * stepCount;
      cumImp[0] += repItem.kaisyu[0]  * stepCount;
      cumImp[1] += repItem.kaisyu[1]  * stepCount;
    }

    const stepId    = `step_${sourceName}_${keyStr}_${idx}`.replace(/[^a-zA-Z0-9_]/g,'_');
    const isOpen    = true; /* デフォルト展開 */
    const hasDayMatch = filtered.length > 0;

    const starLabel = keyNum === 0
      ? `★0 → ★${nextKey}  ( 各 ${stepCount} 回 )`
      : `★${keyNum} → ★${nextKey}  ( ${stepCount} 回 )`;

    html += `<div class="step-block">
      <div class="step-card">
        <div class="step-header ${isOpen?'open':''}" onclick="toggleStep('${stepId}')">
          <span class="star-badge">${starLabel}</span>
          <span class="times-badge">× ${stepCount} 回</span>
          ${!hasDayMatch && G.dayFilter>=0 ? `<span class="warn-label">選択曜日では実施不可</span>` : ''}
          <span class="toggle">▶</span>
        </div>
        <div class="step-body ${isOpen?'open':''}" id="${stepId}">`;

    if (filtered.length === 0 && G.dayFilter >= 0) {
      html += `<div class="nomatch">${DAYS[G.dayFilter]} 曜日では実施できる艦がいません</div>`;
      html += renderBranchTree(items, equip, stepCount, cumRes, cumDev, cumImp, false);
    } else {
      html += renderBranchTree(filtered.length > 0 ? filtered : items,
        equip, stepCount, cumRes, cumDev, cumImp, true);
    }

    html += `</div></div></div>`;
  }

  /* ★10 改修更新ブロック */
  html += renderUpdateBlock(updateItem, targetName, sourceName, equip, cumRes, cumDev, cumImp);
  html += `</div></div></div>`;
  return html;
}

/* ======================================================
   枝分かれ式レシピツリー描画
   ====================================================== */
function renderBranchTree(items, equip, stepCount, cumRes, cumDev, cumImp, active) {
  if (!items || items.length === 0)
    return `<div class="nomatch">データなし</div>`;

  const multi = items.length > 1;
  let html = `<div class="branch-tree ${multi?'multi-branch':''}">`;

  for (let i = 0; i < items.length; i++) {
    const item = items[i];

    if (i > 0) {
      html += `<div class="branch-or">または</div>`;
    }

    html += `<div class="branch-item">`;
    html += `<div class="recipe-card ${active?'':'dimmed'}">`;

    /* 必要艦艇 */
    html += `<div class="info-row">
      <span class="info-label">必要艦艇</span>
      <span class="info-val">${
        item.ship.length > 0
          ? item.ship.map(s => shipTag(s)).join('')
          : '<span style="color:var(--muted)">制限なし</span>'
      }</span>
    </div>`;

    /* 曜日 */
    html += `<div class="info-row">
      <span class="info-label">曜日</span>
      <span class="info-val">${renderDays(item.youbi)}</span>
    </div>`;

    /* 素材 */
    html += `<div class="info-row">
      <span class="info-label">素材</span>
      <span class="info-val">${
        item.soubi && item.soubi.length > 0
          ? renderSoubiList(item.soubi)
          : '<span style="color:var(--muted)">なし</span>'
      }</span>
    </div>`;

    /* 資源（1回分） */
    const res = equip.resource;
    html += `<div class="info-row">
      <span class="info-label">資源(1回)</span>
      <span class="info-val"><div class="res-grid">
        ${res.map((v,i)=>v>0?`<div class="res-box ${RES_KEYS[i]}">
          <div class="res-label">${RES_NAMES[i]}</div>
          <div class="res-val">${v}</div></div>`:''
        ).join('')}
        <div class="res-box dev"><div class="res-label">開発資材</div>
          <div class="res-val">${item.kaihatu[0]}〜${item.kaihatu[1]}</div></div>
        <div class="res-box impr"><div class="res-label">改修資材</div>
          <div class="res-val">${item.kaisyu[0]}〜${item.kaisyu[1]}</div></div>
      </div></span>
    </div>`;

    /* 累計 */
    html += `<div class="cum-row">
      <div class="cum-label">累計（★0 → このステップ完了後）</div>
      <div class="res-grid">
        ${cumRes.map((v,i)=>v>0?`<div class="res-box ${RES_KEYS[i]}">
          <div class="res-label">${RES_NAMES[i]}</div>
          <div class="res-val">${v}</div></div>`:''
        ).join('')}
        <div class="res-box dev"><div class="res-label">開発資材</div>
          <div class="res-val">${cumDev[0]}〜${cumDev[1]}</div></div>
        <div class="res-box impr"><div class="res-label">改修資材</div>
          <div class="res-val">${cumImp[0]}〜${cumImp[1]}</div></div>
      </div>
    </div>`;

    html += `</div></div>`;
  }

  html += `</div>`;
  return html;
}

/* ======================================================
   ★10 改修更新ブロック
   ====================================================== */
function renderUpdateBlock(updateItem, targetName, sourceName, equip, cumRes, cumDev, cumImp) {
  const dayMatch = G.dayFilter < 0 || (updateItem.youbi && updateItem.youbi[G.dayFilter] === 1);
  const finalRes = cumRes.map((v,i) => v + (equip.resource[i]||0));
  const finalDev = [cumDev[0]+updateItem.kaihatu[0], cumDev[1]+updateItem.kaihatu[1]];
  const finalImp = [cumImp[0]+updateItem.kaisyu[0],  cumImp[1]+updateItem.kaisyu[1]];
  const tgtSrc   = equipImgSrc(targetName);

  return `<div class="step-block">
    <div class="update-card" style="${dayMatch||G.dayFilter<0?'':'opacity:.6'}">
      <div class="uc-header">
        <span class="uc-star">★10 改修更新</span>
        <span class="uc-arrow">→</span>
        <div class="uc-result-wrap">
          <img class="uc-result-img" src="${tgtSrc}"
            onerror="this.style.display='none'" alt="${esc(targetName)}">
          <span class="uc-result-name">${esc(targetName)}</span>
        </div>
        ${!dayMatch && G.dayFilter>=0 ? `<span class="update-warn">${DAYS[G.dayFilter]} 曜日は実施不可</span>` : ''}

        <span class="info-label">必要艦艇</span>
        <span>${updateItem.ship.length>0
          ? updateItem.ship.map(s=>shipTag(s)).join('')
          : '<span style="color:var(--muted)">制限なし</span>'}</span>
      </div>
      <div class="info-row">
        <span class="info-label">曜日</span>
        <span>${renderDays(updateItem.youbi)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">更新素材</span>
        <span>${updateItem.soubi && updateItem.soubi.length>0
          ? renderSoubiList(updateItem.soubi)
          : '<span style="color:var(--muted)">なし</span>'}</span>
      </div>
      <div class="info-row">
        <span class="info-label">資材(更新)</span>
        <span><div class="res-grid">
          ${equip.resource.map((v,i)=>v>0?`<div class="res-box ${RES_KEYS[i]}">
            <div class="res-label">${RES_NAMES[i]}</div>
            <div class="res-val">${v}</div></div>`:''
          ).join('')}
          <div class="res-box dev"><div class="res-label">開発資材</div>
            <div class="res-val">${updateItem.kaihatu[0]}〜${updateItem.kaihatu[1]}</div></div>
          <div class="res-box impr"><div class="res-label">改修資材</div>
            <div class="res-val">${updateItem.kaisyu[0]}〜${updateItem.kaisyu[1]}</div></div>
        </div></span>
      </div>

      <div class="cum-row">
        <div class="cum-label">総計（★0 → 改修更新完了まで全て込み）</div>
        <div class="res-grid">
          ${finalRes.map((v,i)=>v>0?`<div class="res-box ${RES_KEYS[i]}" style="border-color:var(--gold)">
            <div class="res-label">${RES_NAMES[i]}</div>
            <div class="res-val">${v}</div></div>`:''
          ).join('')}
          <div class="res-box dev" style="border-color:var(--gold)">
            <div class="res-label">開発資材</div>
            <div class="res-val">${finalDev[0]}〜${finalDev[1]}</div></div>
          <div class="res-box impr" style="border-color:var(--gold)">
            <div class="res-label">改修資材</div>
            <div class="res-val">${finalImp[0]}〜${finalImp[1]}</div></div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ======================================================
   素材リスト（装備画像付き）
   ====================================================== */
function renderSoubiList(soubi) {
  return soubi.map(([name, count]) => {
    const canExpand = !!G.lookup[name];
    const id = 'soubitree_' + name.replace(/[^a-zA-Z0-9_]/g,'_');
    const src = equipImgSrc(name);
    return `<span class="soubi-item">
      <img class="soubi-img-xs" src="${src}"
        onerror="this.style.display='none'" loading="lazy" alt="${esc(name)}">
      <span class="eq-name">${esc(name)}</span>
      <span class="eq-count"> ×${count}</span>
      ${canExpand
        ? `<button class="expand-btn"
             onclick="event.stopPropagation();toggleSoubiInfo('${esc(id)}','${esc(name)}')"
             title="詳細を表示">詳</button>`
        : ''}
    </span>`;
  }).join('');
}

function toggleSoubiInfo(id, name) {
  const existing = document.getElementById('soubi_panel_' + id);
  if (existing) { existing.remove(); return; }
  const panel = document.createElement('div');
  panel.id    = 'soubi_panel_' + id;
  panel.className = 'soubi-tree';
  panel.innerHTML = buildSoubiInfoHTML(name);
  event.target.closest('.info-row').insertAdjacentElement('afterend', panel);
}

function buildSoubiInfoHTML(name) {
  const entry = G.lookup[name];
  if (!entry) return `<div style="color:var(--muted);font-size:11px">データなし</div>`;
  const { category, equip } = entry;

  const asTarget   = G.targets.has(name);
  const canBeResult = [];
  for (const [tgt, srcs] of G.targets)
    for (const src of srcs)
      if (src.sourceName === name) canBeResult.push(tgt);

  const src = equipImgSrc(name);
  let html = `<div class="soubi-tree-inner">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <img src="${src}" width="28" height="28"
        style="object-fit:contain;image-rendering:pixelated;background:rgba(0,0,0,.3);border-radius:3px"
        onerror="this.style.display='none'">
      <span style="font-size:11px;font-weight:700;color:var(--accent)">${esc(name)}</span>
      <span style="font-size:10px;color:var(--muted)">[${esc(category)}]</span>
    </div>`;

  if (asTarget) {
    html += `<div style="font-size:11px;color:var(--green);margin-bottom:4px">
      この装備は改修更新で入手可能 →
      <a href="#" onclick="event.preventDefault();selectTarget('${esc(name)}')"
         style="color:var(--accent)">${esc(name)} の入手ツリーを表示</a>
    </div>`;
  }
  if (canBeResult.length > 0) {
    html += `<div style="font-size:11px;color:var(--gold);margin-bottom:4px">
      この装備から改修更新可能:
      ${canBeResult.map(t=>`<a href="#" onclick="event.preventDefault();selectTarget('${esc(t)}')"
        style="color:var(--gold)">${esc(t)}</a>`).join(', ')}
    </div>`;
  }

  const res = equip.resource || [0,0,0,0];
  const nonZero = res.filter(v=>v>0);
  if (nonZero.length > 0) {
    html += `<div style="font-size:11px;color:var(--muted)">
      基礎資源: ${res.map((v,i)=>v>0?`${RES_NAMES[i]} ×${v}`:'').filter(Boolean).join(' / ')}
    </div>`;
  }
  html += `</div>`;
  return html;
}

/* ======================================================
   ステップ折りたたみ
   ====================================================== */
function toggleStep(id) {
  const el  = document.getElementById(id);
  const hdr = el ? el.previousElementSibling : null;
  if (!el) return;
  const open = el.classList.contains('open');
  el.classList.toggle('open', !open);
  if (hdr) hdr.classList.toggle('open', !open);
}

/* ======================================================
   統計計算
   ====================================================== */
function calcTotalCost(equip, targetName) {
  const stepKeys = Object.keys(equip.info)
    .filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);
  const res = equip.resource || [0,0,0,0];
  let totalRes = [0,0,0,0];
  const soubiTotals = {};
  let devMin=0, devMax=0, impMin=0, impMax=0;

  for (let ki=0; ki<stepKeys.length; ki++) {
    const keyNum  = stepKeys[ki];
    const nextKey = ki+1<stepKeys.length ? stepKeys[ki+1] : 10;
    const cnt     = nextKey - keyNum;
    const items   = equip.info[String(keyNum)] || [];
    const rel     = filterItemsForTarget(items, targetName, -1);
    const item    = rel.length>0 ? rel[0] : (items[0]||null);
    totalRes = totalRes.map((v,i) => v + res[i]*cnt);
    if (item) {
      devMin += item.kaihatu[0]*cnt; devMax += item.kaihatu[1]*cnt;
      impMin += item.kaisyu[0]*cnt;  impMax += item.kaisyu[1]*cnt;
      for (const [sn,sc] of (item.soubi||[]))
        soubiTotals[sn] = (soubiTotals[sn]||0) + sc*cnt;
    }
  }

  for (const it of (equip.info['10']||[]).filter(it=>it.result===targetName)) {
    totalRes = totalRes.map((v,i) => v+res[i]);
    devMin += it.kaihatu[0]; devMax += it.kaihatu[1];
    impMin += it.kaisyu[0];  impMax += it.kaisyu[1];
    for (const [sn,sc] of (it.soubi||[]))
      soubiTotals[sn] = (soubiTotals[sn]||0) + sc;
  }

  return { res:totalRes, soubiTotals, devMin, devMax, impMin, impMax };
}

function collectAllShips(equip, targetName) {
  const ships = new Set();
  for (const [keyStr, items] of Object.entries(equip.info)) {
    for (const item of items) {
      if (keyStr==='10' && item.result!==targetName) continue;
      if (item.result!==targetName && item.result!==null && keyStr!=='10') continue;
      for (const s of (item.ship||[])) ships.add(s);
    }
  }
  return Array.from(ships);
}

/* ======================================================
   ユーティリティ
   ====================================================== */
function filterItemsForTarget(items, targetName, dayIdx) {
  let filtered = items.filter(it => it.result===targetName || it.result===null);
  if (filtered.length===0) filtered = items;
  if (dayIdx>=0) filtered = filtered.filter(it => it.youbi && it.youbi[dayIdx]===1);
  return filtered;
}

function renderDays(youbi) {
  if (!youbi || youbi.length < 7)
    return '<span style="color:var(--muted)">不明</span>';
  return DAYS.map((d,i) => {
    const on   = youbi[i]===1;
    const wknd = i===0||i===6;
    return `<span class="day-pill ${on?'on':'off'} ${on&&wknd?'weekend':''}">${d}</span>`;
  }).join('');
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
