<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>改修更新ツリー</title>
<style>
:root{
  --bg:#07101e;--sf:#0c1828;--sf2:#101f34;--sf3:#152640;--sf4:#1c2f4c;
  --bd:#1a3252;--bd2:#24486e;--bd3:#305a88;
  --tx:#92b8d8;--mt:#385870;--wh:#bce0ff;--dim:#2a4860;
  --ac:#2070b8;--ac2:#38a0e8;
  --gd:#a87820;--gd2:#d0a830;--gd3:#f0c840;
  --gn:#186838;--gn2:#22a058;--gn3:#40e080;
  --pp:#3a2880;--pp2:#6848cc;
  --st:#b08820;--st2:#e0b030;
  --rd:#782020;--rd2:#c03030;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans JP','Yu Gothic UI',sans-serif;font-size:13px;line-height:1.5}
button,input{font-family:inherit;cursor:pointer}
/* ===== APP SHELL ===== */
.app{display:flex;flex-direction:column;height:100vh}
/* ===== HEADER ===== */
.hdr{
  height:42px;flex-shrink:0;
  background:linear-gradient(90deg,#040c18 0%,#0c1e34 100%);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:10px;padding:0 14px;
}
.hdr-badge{
  width:26px;height:26px;border-radius:4px;
  border:1px solid var(--ac);color:var(--ac);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:11px;letter-spacing:-.04em;flex-shrink:0;
}
.hdr-title{font-size:14px;font-weight:700;color:var(--wh);letter-spacing:.04em}
.hdr-gap{flex:1}
.st-dot{width:7px;height:7px;border-radius:50%;background:var(--mt);flex-shrink:0;transition:.3s}
.st-dot.ok{background:var(--gn2)}
.st-msg{font-size:11px;color:var(--mt)}
.hdr-btn{padding:3px 9px;border-radius:3px;border:1px solid var(--bd);background:transparent;color:var(--mt);font-size:11px;transition:.1s}
.hdr-btn:hover{border-color:var(--ac);color:var(--ac)}
/* ===== BODY ===== */
.body{display:flex;flex:1;overflow:hidden}
/* ===== SIDEBAR ===== */
.sb{
  width:248px;flex-shrink:0;
  background:var(--sf);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-sec{padding:8px 10px;border-bottom:1px solid var(--bd)}
.sb-lbl{display:block;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--mt);margin-bottom:6px}
.day-row{display:flex;gap:3px;flex-wrap:wrap}
.dbtn{padding:2px 6px;border-radius:3px;border:1px solid var(--bd);background:transparent;color:var(--mt);font-size:12px;transition:.1s}
.dbtn:hover{border-color:var(--ac);color:var(--ac)}
.dbtn.act{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:700}
.dbtn.act.d0,.dbtn.act.d6{background:#6a2020;border-color:#6a2020}
.srch{width:100%;padding:5px 9px;background:var(--sf2);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:13px;outline:none;transition:.1s}
.srch:focus{border-color:var(--ac)}
.cat-wrap{display:flex;gap:3px;flex-wrap:wrap}
.cchip{padding:2px 7px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--mt);font-size:11px;white-space:nowrap;transition:.1s}
.cchip:hover{border-color:var(--ac);color:var(--ac)}
.cchip.act{background:var(--sf3);border-color:var(--ac);color:var(--ac)}
/* Equipment list */
.eq-list{flex:1;overflow-y:auto;padding:3px 0}
.eq-list::-webkit-scrollbar{width:3px}
.eq-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.eq-chdr{padding:3px 9px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--mt);background:var(--sf2);position:sticky;top:0;z-index:1}
/* [FIX2] 選択後に見やすくなるよう min-height と gap を調整 */
.eq-row{display:flex;align-items:center;gap:8px;padding:6px 8px;min-height:56px;cursor:pointer;border-left:3px solid transparent;transition:.1s}
.eq-row:hover{background:var(--sf2);border-left-color:var(--ac2)}
.eq-row.sel{background:rgba(32,112,184,.08);border-left-color:var(--gd3)}
.eq-row.sel .eq-name{color:var(--gd3)}
.eq-name{flex:1;font-size:12px;line-height:1.4;color:var(--tx)}
.eq-arr{color:var(--mt);font-size:10px;flex-shrink:0}
/* Equipment image box */
.ib{flex-shrink:0;border-radius:4px;overflow:hidden;background:var(--sf3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;position:relative}
.ib img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;display:block}
.ib .fbk{display:none;font-size:9px;color:var(--mt);text-align:center;padding:2px;word-break:break-all;width:100%;height:100%;align-items:center;justify-content:center}
.ib.miss img{display:none}
.ib.miss .fbk{display:flex}
/* ===== CANVAS AREA ===== */
.canvas-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* Empty / load states */
.empty-st,.load-st{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--mt);text-align:center}
.load-box{background:var(--sf2);border:2px dashed var(--bd2);border-radius:12px;padding:36px 52px;cursor:pointer;transition:.2s;max-width:420px;width:90%}
.load-box:hover{border-color:var(--ac)}
.load-ico{font-size:40px;font-weight:900;color:var(--ac);opacity:.3;margin-bottom:14px}
.load-box h2{font-size:15px;color:var(--wh);margin-bottom:8px}
.load-box p{font-size:12px;color:var(--mt);line-height:1.7;margin-bottom:18px}
.load-pbtn{padding:8px 22px;background:var(--ac);border:none;border-radius:5px;color:#fff;font-size:13px;font-weight:700}
/* ===== TARGET STRIP (compact) ===== */
.tgt-strip{
  flex-shrink:0;
  background:linear-gradient(90deg,#04100a 0%,#091c12 100%);
  border-bottom:2px solid var(--gn);
  padding:8px 16px;
  display:flex;align-items:center;gap:12px;
}
.tgt-strip .ib{width:52px;height:52px;border:2px solid var(--gn2)}
.tgt-strip .ib img{image-rendering:pixelated}
.tgt-info{flex:1;min-width:0}
.tgt-eyebrow{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--gn2);margin-bottom:2px}
.tgt-name{font-size:18px;font-weight:700;color:#b0f0c0;line-height:1.2}
.tgt-stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.tstat{font-size:11px;padding:2px 7px;border-radius:3px;border:1px solid;font-variant-numeric:tabular-nums}
.tstat.fuel{border-color:rgba(100,180,255,.3);color:#64b4ff;background:rgba(100,180,255,.06)}
.tstat.ammo{border-color:rgba(230,210,60,.3);color:#e6d23c;background:rgba(230,210,60,.06)}
.tstat.steel{border-color:rgba(120,200,120,.3);color:#78c878;background:rgba(120,200,120,.06)}
.tstat.baux{border-color:rgba(220,140,80,.3);color:#dc8c50;background:rgba(220,140,80,.06)}
.tstat.dev{border-color:rgba(170,120,220,.3);color:#aa78dc;background:rgba(170,120,220,.06)}
.tstat.imp{border-color:rgba(210,140,180,.3);color:#d28cb4;background:rgba(210,140,180,.06)}
.tstat-lbl{opacity:.7;margin-right:2px}
/* ===== ROUTE TABS ===== */
.route-tabs{flex-shrink:0;display:flex;background:var(--sf2);border-bottom:1px solid var(--bd);padding:0 16px;gap:2px}
.rtab{
  padding:6px 14px;font-size:12px;color:var(--mt);border:none;background:transparent;
  border-bottom:2px solid transparent;cursor:pointer;transition:.1s;white-space:nowrap;
}
.rtab:hover{color:var(--tx)}
.rtab.act{color:var(--ac2);border-bottom-color:var(--ac2);font-weight:700}
/* ===== HORIZONTAL FLOW CANVAS ===== */
.flow-scroll{flex:1;overflow:auto;padding:24px 20px 40px}
.flow-scroll::-webkit-scrollbar{width:6px;height:6px}
.flow-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.flow-row{display:flex;align-items:flex-start;gap:0;width:max-content;min-width:100%}
/* Each column: ship section (top) + node card + materials section (bottom) */
.fcol{display:flex;flex-direction:column;align-items:center;width:240px}
.fcol.wide{width:270px}
.fcol.narrow{width:160px}
/* Connector arrow between columns */
.farrow{
  flex-shrink:0;align-self:center;
  width:32px;height:2px;background:var(--bd2);position:relative;
  margin-top:0;
}
.farrow::after{
  content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);
  border-top:5px solid transparent;border-bottom:5px solid transparent;
  border-left:8px solid var(--bd2);
}
/* ===== SHIPS SECTION (above node) ===== */
.ships-section{
  min-height:8px;margin-bottom:6px;
  display:flex;flex-wrap:wrap;gap:4px;justify-content:center;
  max-width:240px;
}
.ship-chip{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:var(--sf2);border:1px solid rgba(180,136,30,.25);
  border-radius:5px;padding:4px 5px;
  font-size:10px;color:var(--gd2);line-height:1.2;
  /* [FIX2] 240x60 の横長バナー画像に合わせた幅 */
  max-width:260px;text-align:center;
}
/* [FIX2] 艦娘バナー画像を 240x60 に修正（元は40x60で見切れていた） */
.ship-portrait{
  width:240px;height:60px;
  object-fit:cover;object-position:center;
  image-rendering:pixelated;
  background:rgba(0,0,0,.3);
  border-radius:3px;
  flex-shrink:0;
}
.ship-name{font-size:10px;line-height:1.2;color:var(--gd2);word-break:break-all}
/* connector line from ships down to node */
.ships-conn{width:1px;height:10px;background:var(--bd2);margin:0 auto}
/* ===== FLOW NODE CARDS ===== */
.fnode{
  width:100%;border-radius:8px;overflow:hidden;
  border:1px solid var(--bd2);position:relative;
  background:var(--sf2);
}
.fnode.source{border-color:#2a5aaa;background:linear-gradient(160deg,#0e1f3e,#0c1830)}
.fnode.step0{border-color:#2a4a9a;background:linear-gradient(160deg,#101828,#0e1a30)}
.fnode.step1{border-color:#4a2a9a;background:linear-gradient(160deg,#141028,#100e2e)}
.fnode.update{border-color:#9a7010;background:linear-gradient(160deg,#1e1608,#1a1206)}
.fnode.target{border-color:#1a8840;background:linear-gradient(160deg,#08200e,#061a0c)}
/* Node header */
.fn-hdr{
  padding:8px 12px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.fn-icon{
  flex-shrink:0;border-radius:5px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.fn-icon img{object-fit:contain;image-rendering:pixelated;width:100%;height:100%}
.fn-icon .fbk{display:none;font-size:8px;color:var(--mt);text-align:center;padding:2px;word-break:break-all;width:100%;height:100%;align-items:center;justify-content:center}
.fn-icon.miss img{display:none}
.fn-icon.miss .fbk{display:flex}
.fn-title{flex:1;min-width:0}
.fn-type{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.fn-name{font-size:13px;font-weight:700;line-height:1.3;word-break:break-all}
.fnode.source .fn-type{color:#6090e0}
.fnode.source .fn-name{color:#9abff8}
.fnode.step0 .fn-type{color:#5080d8}
.fnode.step0 .fn-name{color:#7aa0f0}
.fnode.step1 .fn-type{color:#8060d8}
.fnode.step1 .fn-name{color:#a080f0}
.fnode.update .fn-type{color:var(--gd2)}
.fnode.update .fn-name{color:var(--gd3)}
.fnode.target .fn-type{color:var(--gn2)}
.fnode.target .fn-name{color:var(--gn3)}
/* count badge */
.fn-cnt{
  flex-shrink:0;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--wh);
}
/* [FIX2] Node body sections のスペースを少し広げる */
.fn-body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.fn-sec{display:flex;flex-direction:column;gap:4px}
.fn-sec-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--mt)}
/* Days */
.days-row{display:flex;gap:3px;flex-wrap:wrap}
.dpill{display:inline-block;padding:2px 5px;font-size:10px;font-weight:700;border-radius:2px}
.dpill.on{background:rgba(32,112,184,.2);border:1px solid rgba(32,112,184,.4);color:var(--ac2)}
.dpill.off{background:transparent;border:1px solid transparent;color:var(--dim)}
.dpill.wk{background:rgba(120,32,32,.15);border-color:rgba(120,32,32,.35);color:#d06060}
/* Resource boxes */
.res-row{display:flex;flex-wrap:wrap;gap:4px}
.rb{text-align:center;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:3px 6px;min-width:50px}
.rb .rl{font-size:9px;color:var(--mt)}
.rb .rv{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.rb .rn{font-size:8px;color:var(--dim);margin-top:1px}
.rb.rf .rv{color:#60a8f8} .rb.ra .rv{color:#e0cc40} .rb.rs .rv{color:#60c060} .rb.rb2 .rv{color:#d08040}
.rb.rd .rv{color:#a070d0} .rb.ri .rv{color:#d080b0}
.rb.gld{border-color:rgba(200,160,40,.35)}
/* ===== MATERIALS SECTION (below node) ===== */
/* [FIX2] コネクタと素材セクションのスペースを改善 */
.mats-conn{width:1px;height:16px;background:var(--bd2);margin:0 auto}
.mats-section{
  width:100%;background:rgba(0,0,0,.15);border:1px solid var(--bd);border-radius:6px;
  padding:10px 12px;display:flex;flex-direction:column;gap:6px;
}
.mat-item{display:flex;flex-direction:column;gap:4px}
.mat-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--sf2);border:1px solid var(--bd2);border-radius:4px;
  padding:5px 9px;font-size:11px;
}
.mat-img{width:28px;height:28px;object-fit:contain;image-rendering:pixelated;flex-shrink:0;background:rgba(0,0,0,.2);border-radius:3px}
.mat-name{flex:1;color:var(--tx);line-height:1.3}
.mat-cnt{color:var(--gd2);font-weight:700;white-space:nowrap}
.mat-uptag{font-size:9px;padding:1px 4px;background:rgba(32,112,184,.12);border:1px solid rgba(32,112,184,.25);color:var(--ac2);border-radius:2px;white-space:nowrap}

/* ===== [FIX3] MINI FLOW（素材の改修更新ルートをフローチャート形式で表示） ===== */
.mini-flow-wrap{
  margin-top:4px;
  border:1px solid var(--bd2);
  border-radius:6px;
  background:rgba(0,0,0,.25);
  padding:8px;
  overflow-x:auto;
}
.mini-flow-label{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
  color:var(--ac2);margin-bottom:6px;display:flex;align-items:center;gap:5px;
}
.mini-flow-label::before{content:'↺';font-size:11px}
.mini-flow-row{
  display:flex;align-items:flex-start;gap:0;width:max-content;
}
.mini-col{
  display:flex;flex-direction:column;align-items:center;
  width:130px;flex-shrink:0;
}
.mini-arrow{
  flex-shrink:0;align-self:center;
  width:20px;height:2px;background:var(--bd2);position:relative;flex-shrink:0;
}
.mini-arrow::after{
  content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);
  border-top:4px solid transparent;border-bottom:4px solid transparent;
  border-left:6px solid var(--bd2);
}
.mini-node{
  width:100%;border-radius:5px;overflow:hidden;
  border:1px solid var(--bd2);background:var(--sf2);
  font-size:10px;
}
.mini-node.mn-src{border-color:#2a5aaa;background:linear-gradient(160deg,#0e1f3e,#0c1830)}
.mini-node.mn-step{border-color:#2a4a9a;background:linear-gradient(160deg,#101828,#0e1a30)}
.mini-node.mn-upd{border-color:#8a6010;background:linear-gradient(160deg,#181208,#12100a)}
.mini-node.mn-tgt{border-color:#1a8840;background:linear-gradient(160deg,#08200e,#061a0c)}
.mini-node-hdr{
  padding:4px 6px;display:flex;align-items:center;gap:4px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.mini-node-hdr img{width:18px;height:18px;object-fit:contain;image-rendering:pixelated;border-radius:2px;background:rgba(0,0,0,.3);flex-shrink:0}
.mini-node-hdr-text{font-weight:700;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.mn-src .mini-node-hdr-text{color:#9abff8}
.mn-step .mini-node-hdr-text{color:#7aa0f0}
.mn-upd .mini-node-hdr-text{color:var(--gd3)}
.mn-tgt .mini-node-hdr-text{color:var(--gn3)}
.mini-node-body{padding:5px 6px;display:flex;flex-direction:column;gap:2px}
.mini-mat-row{display:flex;align-items:center;gap:3px}
.mini-mat-row img{width:14px;height:14px;object-fit:contain;image-rendering:pixelated;flex-shrink:0}
.mini-mat-name{font-size:9px;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.mini-mat-cnt{font-size:9px;color:var(--gd2);font-weight:700;white-space:nowrap}
.mini-mat-uptag{font-size:8px;color:var(--ac2)}
.mini-res-row{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.mini-res{font-size:8px;padding:1px 3px;border-radius:2px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.2)}
.mini-more{font-size:9px;color:var(--mt);font-style:italic;padding:2px 4px}
.mini-flow-more{font-size:9px;color:var(--mt);margin-top:4px}

/* Material sub-chain (legacy — kept for depth>=1 fallback) */
.mat-chain{
  margin-left:10px;padding:5px 8px;
  border-left:2px solid var(--ac);
  background:rgba(32,112,184,.04);
  border-radius:0 4px 4px 0;
  font-size:11px;
}
.mat-chain.d1{border-left-color:var(--gd);background:rgba(168,120,32,.04)}
.mat-chain.d2{border-left-color:var(--gn2);background:rgba(34,160,88,.04)}
.mat-chain-ttl{
  font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:4px;padding:2px 5px;border-radius:2px;display:inline-block;
}
.mat-chain.d0 .mat-chain-ttl{color:var(--ac2);background:rgba(32,112,184,.12)}
.mat-chain.d1 .mat-chain-ttl{color:var(--gd2);background:rgba(168,120,32,.12)}
.mat-chain.d2 .mat-chain-ttl{color:var(--gn2);background:rgba(34,160,88,.12)}
.mat-chain-route{background:var(--sf);border:1px solid var(--bd);border-radius:4px;margin-bottom:4px;overflow:hidden}
.mcr-hdr{padding:4px 8px;background:var(--sf2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mcr-src{font-size:11px;font-weight:700;color:var(--ac2)}
.mcr-cat{font-size:9px;color:var(--mt)}
.mcr-body{padding:5px 8px;display:flex;flex-direction:column;gap:4px}
.mcr-step{padding-left:8px;border-left:2px solid var(--bd);padding-top:2px}
.mcr-step-lbl{font-size:9px;color:var(--st2);font-weight:700;margin-bottom:2px}
/* ===== NO MATCH ===== */
.nomatch{padding:4px 8px;background:rgba(80,24,24,.2);border:1px solid rgba(150,48,48,.25);border-radius:3px;font-size:11px;color:#b06060}
.depth-end{font-size:10px;color:var(--mt);font-style:italic;padding:2px 6px}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="hdr">
    <div class="st-dot" id="stDot"></div>
    <div class="hdr-badge">改</div>
    <span class="hdr-title">改修更新ツリー</span>
    <span class="hdr-gap"></span>
    <span class="st-msg" id="stMsg">kaisyu.json を読み込み中...</span>
    <button class="hdr-btn" id="reloadBtn" style="display:none" onclick="showLoad()">再読込</button>
  </header>
  <!-- Body -->
  <div class="body" id="mainBody">
    <div class="load-st" id="loadSt">
      <div class="load-box" onclick="document.getElementById('fin').click()"
           ondragover="event.preventDefault()" ondrop="onDrop(event)">
        <div class="load-ico">JSON</div>
        <h2>kaisyu.json を読み込む</h2>
        <p>クリックでファイル選択、またはここへドラッグ＆ドロップ</p>
        <button class="load-pbtn" onclick="event.stopPropagation();document.getElementById('fin').click()">ファイルを選択</button>
        <input type="file" id="fin" accept=".json" style="display:none" onchange="onFile(this.files[0])">
      </div>
      <p style="font-size:11px;color:var(--mt)">同フォルダに kaisyu.json があれば自動読み込みされます</p>
    </div>
  </div>
</div>
<script>
/* =============================================
STATE
============================================= */
const G={data:null,lookup:{},targets:new Map(),list:[],sel:null,day:-1,search:'',cat:'',route:0};
const DAYS=['日','月','火','水','木','金','土'];
const RNAMES=['燃料','弾薬','鋼材','ボーキ'];
const RCLS=['rf','ra','rs','rb2'];
/* =============================================
IMAGE HELPERS
============================================= */
function eqImg(n){
  return 'image/item/'+n.replace(/＋/g,'+').replace(/[／\/]/g,'^')
    .replace(/砲([A-Fa-f])/g,(_,c)=>String.fromCodePoint(0x78320+parseInt(c,16)))+'.png';
}
function shImg(n){return 'image/ship/'+n+'.png';}
function mkIb(nm,w,h,extraCls=''){
  const s=eqImg(nm),fb=esc(nm.slice(0,5));
  return `<div class="ib ${extraCls}" style="width:${w}px;height:${h}px">
<img src="${s}" alt="${esc(nm)}" loading="lazy" onerror="this.parentNode.classList.add('miss')">
<div class="fbk">${fb}</div>
</div>`;
}
function mkFnIcon(nm,w,h){
  const s=eqImg(nm),fb=esc(nm.slice(0,4));
  return `<div class="fn-icon" style="width:${w}px;height:${h}px;background:rgba(0,0,0,.4);border-radius:5px;overflow:hidden">
<img src="${s}" alt="${esc(nm)}" loading="lazy" onerror="this.parentNode.classList.add('miss')">
<div class="fbk">${fb}</div>
</div>`;
}
/* =============================================
INIT / LOAD
============================================= */
addEventListener('DOMContentLoaded',async()=>{
  try{const r=await fetch('./kaisyu.json');if(r.ok){init(await r.json());return;}}catch(_){}
  showLoad();
});
function showLoad(){
  const mb=document.getElementById('mainBody');
  const ls=document.getElementById('loadSt');
  if(!mb.contains(ls)){mb.innerHTML='';mb.appendChild(ls);}
  ls.style.display='';
  document.getElementById('reloadBtn').style.display='block';
  setS('待機中',false);
}
function onFile(f){
  if(!f)return;setS('読み込み中...',false);
  const r=new FileReader();
  r.onload=e=>{try{init(JSON.parse(e.target.result));}catch{setS('JSON解析エラー',false);}};
  r.readAsText(f,'UTF-8');
}
function onDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)onFile(f);}
function setS(t,ok){
  document.getElementById('stMsg').textContent=t;
  document.getElementById('stDot').className='st-dot'+(ok?' ok':'');
}
function init(json){
  G.data=json;G.lookup={};G.targets=new Map();
  for(const[cat,equips] of Object.entries(json))
    for(const[nm,eq] of Object.entries(equips))
      G.lookup[nm]={category:cat,equip:eq};
  for(const[cat,equips] of Object.entries(json))
    for(const[nm,eq] of Object.entries(equips))
      for(const it of(eq.info['10']||[]))
        if(it.result){
          if(!G.targets.has(it.result))G.targets.set(it.result,[]);
          G.targets.get(it.result).push({src:nm,cat,equip:eq,item:it});
        }
  G.list=Array.from(G.targets.keys()).sort();
  setS(`${G.list.length}件の改修更新装備`,true);
  document.getElementById('reloadBtn').style.display='block';
  buildUI();
}
/* =============================================
MAIN UI
============================================= */
function buildUI(){
  const mb=document.getElementById('mainBody');
  mb.innerHTML=`
<aside class="sb" id="sb">
<div class="sb-sec">
<span class="sb-lbl">曜日フィルター</span>
<div class="day-row">
<button class="dbtn act" data-d="-1" onclick="setDay(-1)">全</button>
        ${DAYS.map((d,i)=>`<button class="dbtn d${i}" data-d="${i}" onclick="setDay(${i})">${d}</button>`).join('')}
</div>
</div>
<div class="sb-sec">
<span class="sb-lbl">カテゴリ</span>
<div class="cat-wrap" id="catW">
<button class="cchip act" data-c="" onclick="setCat('')">全て</button>
</div>
</div>
<div class="sb-sec">
<span class="sb-lbl">装備名検索</span>
<input class="srch" type="text" placeholder="装備名を入力..." oninput="setSearch(this.value)">
</div>
<div class="eq-list" id="eqList"></div>
</aside>
<div class="canvas-wrap" id="canvasWrap">
<div class="empty-st">
<div style="font-size:28px;color:var(--bd2);letter-spacing:.1em">---</div>
<div>左のリストから装備を選んでください</div>
<div style="font-size:11px;color:var(--mt)">改修更新ツリーが表示されます</div>
</div>
</div>`;
  buildCatChips();
  renderList();
}

/* =============================================
[FIX1] カテゴリチップのラベル生成
「艦上爆撃機」→「艦爆」に短縮し、「水上爆撃機」はそのまま表示する。
元コードは .replace('水上','') で両方が「爆撃機」になっていた。
============================================= */
function buildCatChips(){
  const cats=new Set();
  for(const[,srcs] of G.targets)for(const s of srcs)cats.add(s.cat);
  const cw=document.getElementById('catW');
  Array.from(cats).sort().forEach(c=>{
    const b=document.createElement('button');
    b.className='cchip';b.dataset.c=c;
    // 艦上爆撃機→艦爆（水上爆撃機と区別するため短縮）
    // 水上爆撃機はそのまま残す
    // 艦上（爆撃機以外）→「艦上」を除去
    const label = c
      .replace(/[主副]砲/,'砲')
      .replace('艦上爆撃機','艦爆')
      .replace('艦上','')
      || c.slice(0,4);
    b.textContent=label;
    b.title=c;b.onclick=()=>setCat(c);
    cw.appendChild(b);
  });
}
/* =============================================
FILTERS
============================================= */
function setDay(d){G.day=d;document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('act',+b.dataset.d===d));if(G.sel)renderTree(G.sel);renderList();}
function setCat(c){G.cat=c;document.querySelectorAll('.cchip').forEach(b=>b.classList.toggle('act',b.dataset.c===c));renderList();}
function setSearch(t){G.search=t.trim();renderList();}
/* =============================================
EQUIPMENT LIST
============================================= */
function renderList(){
  const c=document.getElementById('eqList');if(!c)return;
  const{search,day,cat}=G;const grp={};
  for(const t of G.list){
    const srcs=G.targets.get(t);if(!srcs)continue;
    const cats=srcs.map(s=>s.cat);
    if(cat&&!cats.includes(cat))continue;
    if(search&&!t.includes(search))continue;
    if(day>=0&&!srcs.some(s=>s.item.youbi&&s.item.youbi[day]===1))continue;
    const dc=cat||cats[0]||'その他';
    if(!grp[dc])grp[dc]=[];
    grp[dc].push(t);
  }
  let h='';
  for(const[cat,items] of Object.entries(grp).sort()){
    h+=`<div class="eq-chdr">${esc(cat)}</div>`;
    for(const t of items){
      const sel=G.sel===t;
      h+=`<div class="eq-row${sel?' sel':''}" onclick="selTgt('${esc(t)}')">
        ${mkIb(t,44,44)}
<span class="eq-name">${esc(t)}</span>
<span class="eq-arr">›</span>
</div>`;
    }
  }
  if(!h)h=`<div style="padding:16px;color:var(--mt);text-align:center;font-size:12px">該当なし</div>`;
  c.innerHTML=h;
}
function selTgt(n){G.sel=n;G.route=0;renderList();renderTree(n);}
/* =============================================
RENDER TREE
============================================= */
function renderTree(tgt){
  const cw=document.getElementById('canvasWrap');if(!cw)return;
  const srcs=G.targets.get(tgt);
  if(!srcs||!srcs.length){cw.innerHTML=`<div class="empty-st"><div>データなし</div></div>`;return;}
  /* Compute totals for strip */
  const p=srcs[G.route]||srcs[0];
  const tot=calcCost(p.equip,tgt);
  const ships=allShips(p.equip,tgt);
  /* Target strip (compact) */
  let h=`<div class="tgt-strip">
    ${mkIb(tgt,52,52,'','')}
<div class="tgt-info">
<div class="tgt-eyebrow">目標装備</div>
<div class="tgt-name">${esc(tgt)}</div>
<div class="tgt-stats">
        ${tot.res.map((v,i)=>v>0?`<span class="tstat ${['fuel','ammo','steel','baux'][i]}"><span class="tstat-lbl">${RNAMES[i]}</span>${v}</span>`:'').join('')}
        ${tot.devMin>0?`<span class="tstat dev"><span class="tstat-lbl">開発</span>通常${tot.devMin}/確実${tot.devMax}</span>`:''}
        ${tot.impMin>0?`<span class="tstat imp"><span class="tstat-lbl">改修</span>通常${tot.impMin}/確実${tot.impMax}</span>`:''}
</div>
</div>
</div>`;
  /* Route tabs */
  if(srcs.length>1){
    h+=`<div class="route-tabs">
      ${srcs.map((_,i)=>`<button class="rtab${G.route===i?' act':''}" onclick="selRoute(${i},'${esc(tgt)}')">ルート${i+1}</button>`).join('')}
</div>`;
  }
  /* Flow canvas */
  h+=`<div class="flow-scroll"><div class="flow-row">`;
  h+=buildRouteFlow(tgt,srcs[G.route]||srcs[0]);
  h+=`</div></div>`;
  cw.innerHTML=h;
}
function selRoute(i,tgt){G.route=i;renderTree(tgt);}
/* =============================================
BUILD ROUTE FLOW (horizontal nodes)
============================================= */
function buildRouteFlow(tgtNm,src){
  const{src:srcNm,cat:srcCat,equip,item:updItem}=src;
  const stepKeys=Object.keys(equip.info).filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);
  let h='';
  /* SOURCE node */
  h+=`<div class="fcol">
<div class="ships-section"></div>
<div class="ships-conn"></div>
    ${buildSourceNode(srcNm,srcCat,equip)}
<div class="mats-conn"></div>
<div class="mats-section"><span style="font-size:10px;color:var(--mt)">起点装備</span></div>
</div>`;
  /* STEP nodes */
  let cumRes=[0,0,0,0],cumDev=[0,0],cumImp=[0,0];
  for(let ki=0;ki<stepKeys.length;ki++){
    const kn=stepKeys[ki];
    const nk=ki+1<stepKeys.length?stepKeys[ki+1]:10;
    const sc=nk-kn;
    const items=equip.info[String(kn)]||[];
    const filt=filtTgt(items,tgtNm,G.day);
    const rep=filt.length>0?filt[0]:(items[0]||null);
    if(rep){
      cumRes=cumRes.map((v,i)=>v+(equip.resource[i]||0)*sc);
      cumDev[0]+=rep.kaihatu[0]*sc;cumDev[1]+=rep.kaihatu[1]*sc;
      cumImp[0]+=rep.kaisyu[0]*sc;cumImp[1]+=rep.kaisyu[1]*sc;
    }
    const cls=kn<6?'step0':'step1';
    const lbl=kn===0?`★0 → ★${nk}`:`★${kn} → ★${nk}`;
    const shipSet=new Set();
    for(const it of (filt.length>0?filt:items)) for(const s of(it.ship||[])) shipSet.add(s);
    h+=`<div class="farrow"></div>
<div class="fcol">
<div class="ships-section">${renderShips(Array.from(shipSet))}</div>
<div class="ships-conn"></div>
      ${buildStepNode(lbl,sc,cls,filt.length>0?filt:items,equip,tgtNm)}
<div class="mats-conn"></div>
      ${buildMatsSection(filt.length>0?filt:items,equip,sc,cumRes,cumDev,cumImp)}
</div>`;
  }
  /* UPDATE node */
  const updShips=new Set(updItem.ship||[]);
  h+=`<div class="farrow"></div>
<div class="fcol">
<div class="ships-section">${renderShips(Array.from(updShips))}</div>
<div class="ships-conn"></div>
    ${buildUpdateNode(tgtNm,updItem,equip)}
<div class="mats-conn"></div>
    ${buildUpdateMats(updItem,equip,cumRes,cumDev,cumImp)}
</div>`;
  /* TARGET node */
  h+=`<div class="farrow"></div>
<div class="fcol narrow">
<div class="ships-section"></div>
<div class="ships-conn"></div>
    ${buildTargetNode(tgtNm)}
<div class="mats-conn"></div>
<div class="mats-section"><span style="font-size:10px;color:var(--gn2)">入手完了</span></div>
</div>`;
  return h;
}
/* =============================================
NODE BUILDERS
============================================= */
function buildSourceNode(nm,cat,equip){
  const res=equip.resource;
  return `<div class="fnode source">
<div class="fn-hdr">
      ${mkFnIcon(nm,48,48)}
<div class="fn-title">
<div class="fn-type">起点装備</div>
<div class="fn-name">${esc(nm)}</div>
</div>
</div>
<div class="fn-body">
<div class="fn-sec">
<div class="fn-sec-lbl">カテゴリ</div>
<div style="font-size:11px;color:var(--mt)">${esc(cat)}</div>
</div>
<div class="fn-sec">
<div class="fn-sec-lbl">基礎資源（1回）</div>
<div class="res-row">${res.map((v,i)=>v>0?`<div class="rb ${RCLS[i]}"><div class="rl">${RNAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')||'<span style="font-size:11px;color:var(--mt)">なし</span>'}</div>
</div>
</div>
</div>`;
}
function buildStepNode(lbl,cnt,cls,items,equip,tgtNm){
  const days=items.length>0?items[0].youbi:null;
  const multi=items.length>1;
  const dayMatch=G.day<0||(days&&days[G.day]===1);
  return `<div class="fnode ${cls}"${!dayMatch&&G.day>=0?' style="opacity:.5"':''}>
<div class="fn-hdr">
<div class="fn-title">
<div class="fn-type">${esc(lbl)}</div>
<div class="fn-name" style="font-size:12px">${cnt}回 × 各1回</div>
</div>
<div class="fn-cnt">${cnt}回</div>
</div>
<div class="fn-body">
      ${!dayMatch&&G.day>=0?`<div class="nomatch">${DAYS[G.day]}曜日は実施不可</div>`:''}
      ${multi?`<div style="font-size:10px;color:var(--ac2)">レシピ${items.length}種（代表1種表示）</div>`:''}
<div class="fn-sec">
<div class="fn-sec-lbl">曜日</div>
<div class="days-row">${renderDays(days)}</div>
</div>
</div>
</div>`;
}
function buildUpdateNode(tgtNm,updItem,equip){
  const dayOk=G.day<0||(updItem.youbi&&updItem.youbi[G.day]===1);
  return `<div class="fnode update"${!dayOk&&G.day>=0?' style="opacity:.5"':''}>
<div class="fn-hdr">
      ${mkFnIcon(tgtNm,48,48)}
<div class="fn-title">
<div class="fn-type">★10 改修更新</div>
<div class="fn-name">${esc(tgtNm)}</div>
</div>
</div>
<div class="fn-body">
      ${!dayOk&&G.day>=0?`<div class="nomatch">${DAYS[G.day]}曜日は実施不可</div>`:''}
<div class="fn-sec">
<div class="fn-sec-lbl">曜日</div>
<div class="days-row">${renderDays(updItem.youbi)}</div>
</div>
</div>
</div>`;
}
function buildTargetNode(nm){
  return `<div class="fnode target">
<div class="fn-hdr">
      ${mkFnIcon(nm,48,48)}
<div class="fn-title">
<div class="fn-type">入手装備</div>
<div class="fn-name">${esc(nm)}</div>
</div>
</div>
<div class="fn-body">
<div style="font-size:11px;color:var(--gn2)">改修更新で入手完了</div>
</div>
</div>`;
}
/* =============================================
MATERIALS SECTIONS (below nodes)
============================================= */
function buildMatsSection(items,equip,stepCnt,cumRes,cumDev,cumImp){
  const rep=items[0];
  if(!rep)return `<div class="mats-section"><span style="font-size:11px;color:var(--mt)">データなし</span></div>`;
  const res=equip.resource;
  let h=`<div class="mats-section">`;
  if(rep.soubi&&rep.soubi.length){
    h+=`<div style="font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--mt);margin-bottom:4px">素材（1回）</div>`;
    for(const[nm,cnt] of rep.soubi)
      h+=buildMatEntry(nm,cnt,stepCnt,0,new Set());
  }
  h+=`<div style="margin-top:6px">
<div style="font-size:9px;color:var(--mt);font-weight:700;margin-bottom:4px">資源（1回×${stepCnt}）</div>
<div class="res-row" style="margin-bottom:6px">
      ${res.map((v,i)=>v>0?`<div class="rb ${RCLS[i]}"><div class="rl">${RNAMES[i]}</div><div class="rv">${v}</div><div class="rn">×${stepCnt}=${v*stepCnt}</div></div>`:'').join('')}
<div class="rb rd"><div class="rl">開発資材</div><div class="rv">${rep.kaihatu[0]}</div><div class="rn">確実:${rep.kaihatu[1]}</div></div>
<div class="rb ri"><div class="rl">改修資材</div><div class="rv">${rep.kaisyu[0]}</div><div class="rn">確実:${rep.kaisyu[1]}</div></div>
</div>
<div style="font-size:9px;color:var(--mt);font-weight:700;margin-bottom:4px">累計（★0→このステップ）</div>
<div class="res-row">
      ${cumRes.map((v,i)=>v>0?`<div class="rb ${RCLS[i]} gld"><div class="rl">${RNAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
<div class="rb rd gld"><div class="rl">開発</div><div class="rv">${cumDev[0]}</div><div class="rn">確実:${cumDev[1]}</div></div>
<div class="rb ri gld"><div class="rl">改修</div><div class="rv">${cumImp[0]}</div><div class="rn">確実:${cumImp[1]}</div></div>
</div>
</div>`;
  h+=`</div>`;
  return h;
}
function buildUpdateMats(updItem,equip,cumRes,cumDev,cumImp){
  const fRes=cumRes.map((v,i)=>v+(equip.resource[i]||0));
  const fDev=[cumDev[0]+updItem.kaihatu[0],cumDev[1]+updItem.kaihatu[1]];
  const fImp=[cumImp[0]+updItem.kaisyu[0],cumImp[1]+updItem.kaisyu[1]];
  const res=equip.resource;
  let h=`<div class="mats-section">`;
  if(updItem.soubi&&updItem.soubi.length){
    h+=`<div style="font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--mt);margin-bottom:4px">更新素材</div>`;
    for(const[nm,cnt] of updItem.soubi)
      h+=buildMatEntry(nm,cnt,1,0,new Set());
  }
  h+=`<div style="margin-top:6px">
<div style="font-size:9px;color:var(--mt);font-weight:700;margin-bottom:4px">更新資材</div>
<div class="res-row" style="margin-bottom:6px">
      ${res.map((v,i)=>v>0?`<div class="rb ${RCLS[i]}"><div class="rl">${RNAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
<div class="rb rd"><div class="rl">開発資材</div><div class="rv">${updItem.kaihatu[0]}</div><div class="rn">確実:${updItem.kaihatu[1]}</div></div>
<div class="rb ri"><div class="rl">改修資材</div><div class="rv">${updItem.kaisyu[0]}</div><div class="rn">確実:${updItem.kaisyu[1]}</div></div>
</div>
<div style="font-size:9px;color:var(--gd2);font-weight:700;margin-bottom:4px">総合計（全工程）</div>
<div class="res-row">
      ${fRes.map((v,i)=>v>0?`<div class="rb ${RCLS[i]} gld"><div class="rl">${RNAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
<div class="rb rd gld"><div class="rl">開発</div><div class="rv">${fDev[0]}</div><div class="rn">確実:${fDev[1]}</div></div>
<div class="rb ri gld"><div class="rl">改修</div><div class="rv">${fImp[0]}</div><div class="rn">確実:${fImp[1]}</div></div>
</div>
</div>`;
  h+=`</div>`;
  return h;
}
/* =============================================
MATERIAL ENTRY
============================================= */
function buildMatEntry(nm,cnt,stepCnt,depth,visited){
  const total=cnt*stepCnt;
  const canChain=!visited.has(nm)&&depth<3&&G.targets.has(nm);
  const imgSrc=eqImg(nm);
  let h=`<div class="mat-item">
<div class="mat-chip">
<img class="mat-img" src="${imgSrc}" alt="${esc(nm)}" loading="lazy" onerror="this.style.display='none'">
<span class="mat-name">${esc(nm)}</span>
<span class="mat-cnt">×${cnt}${stepCnt>1?` (計×${total})`:''}</span>
      ${canChain?`<span class="mat-uptag">改修更新可</span>`:''}
</div>`;
  if(canChain){
    const nv=new Set(visited);nv.add(nm);
    // [FIX3] depth=0 のときはフローチャート形式、depth>=1 は従来のテキスト形式
    h+=buildMatChain(nm,depth,nv);
  }
  h+=`</div>`;
  return h;
}

/* =============================================
[FIX3] MATERIAL CHAIN — フローチャート形式に変更
depth=0: 横並びミニフローで表示（徐々に小さくならない）
depth>=1: 簡易テキストリスト（無限ネスト防止）
============================================= */
function buildMatChain(nm,depth,visited){
  if(depth>=3)return `<div class="depth-end">展開上限（3階層）</div>`;
  const srcs=G.targets.get(nm);
  if(!srcs||!srcs.length)return '';

  if(depth===0){
    // フローチャート形式（ミニフロー）
    return buildMiniFlow(nm,srcs,visited);
  } else {
    // depth>=1 は従来の簡易テキスト（小さくなるが階層が浅いので許容）
    return buildLegacyChain(nm,srcs,depth,visited);
  }
}

/* =============================================
[FIX3] buildMiniFlow — 横並びフローチャート形式
入手ルートを「起点 → ★0→★N → ... → ★10更新 → 入手」の
横フローで表示する
============================================= */
function buildMiniFlow(nm,srcs,visited){
  const showCount=Math.min(srcs.length,2);
  let h=`<div class="mini-flow-wrap">
<div class="mini-flow-label">入手ルート（改修更新）</div>`;

  for(let si=0;si<showCount;si++){
    const{src:srcNm,cat:srcCat,equip,item:updItem}=srcs[si];
    const stepKeys=Object.keys(equip.info).filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);

    if(showCount>1){
      h+=`<div style="font-size:9px;color:var(--mt);margin-bottom:5px">ルート${si+1}/${srcs.length}：${esc(srcNm)}</div>`;
    }

    h+=`<div class="mini-flow-row">`;

    // --- 起点ノード ---
    h+=`<div class="mini-col">
<div class="mini-node mn-src">
<div class="mini-node-hdr">
<img src="${eqImg(srcNm)}" alt="${esc(srcNm)}" loading="lazy" onerror="this.style.display='none'">
<span class="mini-node-hdr-text" title="${esc(srcNm)}">${esc(srcNm)}</span>
</div>
<div class="mini-node-body">
<div style="font-size:9px;color:var(--mt)">起点</div>
<div style="font-size:9px;color:var(--mt)">${esc(srcCat)}</div>
</div>
</div>
</div>`;

    // --- ステップノード ---
    for(let ki=0;ki<stepKeys.length;ki++){
      const kn=stepKeys[ki];
      const nk=ki+1<stepKeys.length?stepKeys[ki+1]:10;
      const cnt=nk-kn;
      const items=equip.info[String(kn)]||[];
      const rep=items[0];
      const lbl=kn===0?`★0→★${nk}`:`★${kn}→★${nk}`;

      h+=`<div class="mini-arrow"></div>
<div class="mini-col">
<div class="mini-node mn-step">
<div class="mini-node-hdr">
<span class="mini-node-hdr-text">${esc(lbl)}</span>
<span style="font-size:8px;color:var(--mt);flex-shrink:0">×${cnt}</span>
</div>
<div class="mini-node-body">`;

      if(rep){
        h+=buildMiniMats(rep.soubi,equip.resource,rep.kaihatu,rep.kaisyu,cnt,visited);
      }

      h+=`</div>
</div>
</div>`;
    }

    // --- ★10 更新ノード ---
    h+=`<div class="mini-arrow"></div>
<div class="mini-col">
<div class="mini-node mn-upd">
<div class="mini-node-hdr">
<span class="mini-node-hdr-text">★10 更新</span>
</div>
<div class="mini-node-body">`;
    h+=buildMiniMats(updItem.soubi,equip.resource,updItem.kaihatu,updItem.kaisyu,1,visited);
    h+=`</div>
</div>
</div>`;

    // --- 入手ノード ---
    h+=`<div class="mini-arrow"></div>
<div class="mini-col">
<div class="mini-node mn-tgt">
<div class="mini-node-hdr">
<img src="${eqImg(nm)}" alt="${esc(nm)}" loading="lazy" onerror="this.style.display='none'">
<span class="mini-node-hdr-text" title="${esc(nm)}">${esc(nm)}</span>
</div>
<div class="mini-node-body">
<div style="font-size:9px;color:var(--gn2)">入手</div>
</div>
</div>
</div>`;

    h+=`</div>`; // mini-flow-row
    if(si<showCount-1)h+=`<div style="height:8px"></div>`;
  }

  if(srcs.length>2){
    h+=`<div class="mini-flow-more">他 ${srcs.length-2} ルート省略</div>`;
  }

  h+=`</div>`; // mini-flow-wrap
  return h;
}

/* =============================================
[FIX3] buildMiniMats — ミニフロー内の素材リスト
※ここではさらなる再帰展開はせず、シンプルなリストのみ表示する
  （徐々に小さくなる問題を根本的に解消するため）
============================================= */
function buildMiniMats(soubi,resource,kaihatu,kaisyu,cnt,visited){
  let h='';
  if(soubi&&soubi.length){
    for(const[mn,mc] of soubi){
      const canChain=!visited.has(mn)&&G.targets.has(mn);
      h+=`<div class="mini-mat-row">
<img src="${eqImg(mn)}" alt="${esc(mn)}" loading="lazy" onerror="this.style.display='none'">
<span class="mini-mat-name" title="${esc(mn)}">${esc(mn)}</span>
<span class="mini-mat-cnt">×${mc*cnt}</span>
        ${canChain?`<span class="mini-mat-uptag">↺</span>`:''}
</div>`;
    }
  }
  const res=resource||[0,0,0,0];
  const resColors=['#60a8f8','#e0cc40','#60c060','#d08040'];
  const hasRes=res.some(v=>v>0)||kaihatu[0]>0||kaisyu[0]>0;
  if(hasRes){
    h+=`<div class="mini-res-row">`;
    res.forEach((v,i)=>{if(v>0)h+=`<span class="mini-res" style="color:${resColors[i]}">${RNAMES[i].slice(0,2)}:${v*cnt}</span>`;});
    if(kaihatu[0]>0)h+=`<span class="mini-res" style="color:#a070d0">開:${kaihatu[0]*cnt}</span>`;
    if(kaisyu[0]>0)h+=`<span class="mini-res" style="color:#d080b0">改:${kaisyu[0]*cnt}</span>`;
    h+=`</div>`;
  }
  return h;
}

/* =============================================
[FIX3] buildLegacyChain — depth>=1 の場合の簡易表示
（以前の mat-chain スタイルを使用、ただしインデントは1段のみ）
============================================= */
function buildLegacyChain(nm,srcs,depth,visited){
  const dc=['d0','d1','d2'][Math.min(depth,2)];
  const nv=new Set(visited);nv.add(nm);
  let h=`<div class="mat-chain ${dc}">
<div class="mat-chain-ttl">${esc(nm)} の入手ルート</div>`;

  for(let si=0;si<Math.min(srcs.length,2);si++){
    const{src:srcNm,cat:srcCat,equip,item:updItem}=srcs[si];
    const stepKeys=Object.keys(equip.info).filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);
    h+=`<div class="mat-chain-route">
<div class="mcr-hdr">
<img src="${eqImg(srcNm)}" width="24" height="24" style="object-fit:contain;image-rendering:pixelated;border-radius:3px;background:rgba(0,0,0,.2);flex-shrink:0" onerror="this.style.display='none'" loading="lazy">
<span class="mcr-src">${esc(srcNm)}</span>
<span class="mcr-cat">[${esc(srcCat)}]</span>
        ${srcs.length>1?`<span style="font-size:9px;color:var(--mt);margin-left:auto">ルート${si+1}/${srcs.length}</span>`:''}
</div>
<div class="mcr-body">`;
    for(let ki=0;ki<stepKeys.length;ki++){
      const kn=stepKeys[ki];
      const nk=ki+1<stepKeys.length?stepKeys[ki+1]:10;
      const sc=nk-kn;
      const items=equip.info[String(kn)]||[];
      const rep=items[0];
      if(!rep)continue;
      const slbl=kn===0?`★0〜★${nk}（${sc}回）`:`★${kn}〜★${nk}（${sc}回）`;
      h+=`<div class="mcr-step">
<div class="mcr-step-lbl">${slbl}</div>`;
      if(rep.soubi&&rep.soubi.length){
        for(const[mnm,mcnt] of rep.soubi){
          if(mnm===srcNm)continue;
          h+=buildMatEntry(mnm,mcnt,sc,depth+1,nv);
        }
      }
      const res=equip.resource||[0,0,0,0];
      h+=`<div class="res-row" style="margin-top:3px">
        ${res.map((v,i)=>v>0?`<div class="rb ${RCLS[i]}"><div class="rl">${RNAMES[i]}</div><div class="rv">${v}</div></div>`:'').join('')}
<div class="rb rd"><div class="rl">開発</div><div class="rv">${rep.kaihatu[0]}<span style="font-size:8px;color:var(--dim)">/確${rep.kaihatu[1]}</span></div></div>
<div class="rb ri"><div class="rl">改修</div><div class="rv">${rep.kaisyu[0]}<span style="font-size:8px;color:var(--dim)">/確${rep.kaisyu[1]}</span></div></div>
</div></div>`;
    }
    h+=`<div class="mcr-step" style="border-left-color:rgba(200,160,40,.4)">
<div class="mcr-step-lbl" style="color:var(--gd2)">★10 更新 → ${esc(nm)}</div>`;
    if(updItem.soubi&&updItem.soubi.length){
      for(const[mnm,mcnt] of updItem.soubi)
        h+=buildMatEntry(mnm,mcnt,1,depth+1,nv);
    }
    h+=`<div class="res-row" style="margin-top:3px">
<div class="rb rd"><div class="rl">開発</div><div class="rv">${updItem.kaihatu[0]}</div></div>
<div class="rb ri"><div class="rl">改修</div><div class="rv">${updItem.kaisyu[0]}</div></div>
</div></div>`;
    h+=`</div></div>`;
  }
  if(srcs.length>2)h+=`<div style="font-size:10px;color:var(--mt);margin-top:3px">他 ${srcs.length-2} ルート省略</div>`;
  h+=`</div>`;
  return h;
}

/* =============================================
SHIPS CHIPS
============================================= */
function renderShips(shipArr){
  if(!shipArr||!shipArr.length)return '';
  return shipArr.map(nm=>{
    const src=shImg(nm);
    return `<div class="ship-chip">
<img class="ship-portrait" src="${src}" alt="${esc(nm)}" loading="lazy"
onerror="this.style.display='none'">
<span class="ship-name">${esc(nm)}</span>
</div>`;
  }).join('');
}
/* =============================================
COST CALCULATION
============================================= */
function calcCost(equip,tgt){
  const sk=Object.keys(equip.info).filter(k=>k!=='10').map(Number).sort((a,b)=>a-b);
  const res=equip.resource||[0,0,0,0];
  let tRes=[0,0,0,0],tot={},dMin=0,dMax=0,iMin=0,iMax=0;
  for(let ki=0;ki<sk.length;ki++){
    const kn=sk[ki],nk=ki+1<sk.length?sk[ki+1]:10,cnt=nk-kn;
    const items=equip.info[String(kn)]||[];
    const rel=filtTgt(items,tgt,-1);
    const it=rel.length>0?rel[0]:(items[0]||null);
    tRes=tRes.map((v,i)=>v+res[i]*cnt);
    if(it){
      dMin+=it.kaihatu[0]*cnt;dMax+=it.kaihatu[1]*cnt;
      iMin+=it.kaisyu[0]*cnt;iMax+=it.kaisyu[1]*cnt;
      for(const[sn,sc] of(it.soubi||[]))tot[sn]=(tot[sn]||0)+sc*cnt;
    }
  }
  for(const it of(equip.info['10']||[]).filter(x=>x.result===tgt)){
    tRes=tRes.map((v,i)=>v+res[i]);
    dMin+=it.kaihatu[0];dMax+=it.kaihatu[1];
    iMin+=it.kaisyu[0];iMax+=it.kaisyu[1];
    for(const[sn,sc] of(it.soubi||[]))tot[sn]=(tot[sn]||0)+sc;
  }
  return{res:tRes,soubiTotals:tot,devMin:dMin,devMax:dMax,impMin:iMin,impMax:iMax};
}
function allShips(equip,tgt){
  const s=new Set();
  for(const[ks,items] of Object.entries(equip.info))
    for(const it of items){
      if(ks==='10'&&it.result!==tgt)continue;
      if(it.result!==tgt&&it.result!==null&&ks!=='10')continue;
      for(const x of(it.ship||[]))s.add(x);
    }
  return Array.from(s);
}
function filtTgt(items,tgt,day){
  let f=items.filter(x=>x.result===tgt||x.result===null);
  if(!f.length)f=items;
  if(day>=0)f=f.filter(x=>x.youbi&&x.youbi[day]===1);
  return f;
}
/* =============================================
UTILITIES
============================================= */
function renderDays(youbi){
  if(!youbi||youbi.length<7)return '<span style="color:var(--mt)">不明</span>';
  return DAYS.map((d,i)=>{
    const on=youbi[i]===1,wk=(i===0||i===6)&&on;
    return `<span class="dpill ${on?'on':'off'} ${wk?'wk':''}">${d}</span>`;
  }).join('');
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
