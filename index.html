<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>改修プランナー</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#1e1e1e;
  color:white;
}

header {
  padding:10px;
  background:#111;
  display:flex;
  gap:10px;
  align-items:center;
}

select { padding:5px; }

#days span {
  margin:2px;
  padding:4px;
  cursor:pointer;
}

.on { background:#4caf50; }
.off{ background:#555; }

#main {
  padding:20px;
}

.stage {
  margin:20px auto;
  width:400px;
  border-radius:10px;
  padding:15px;
  background:#2c2c2c;
  box-shadow:0 3px 10px rgba(0,0,0,0.5);
}

.stage h3 { margin:0 0 10px 0; }

.arrow {
  text-align:center;
  font-size:24px;
}

.materials, .resources {
  margin-top:10px;
  font-size:14px;
}

.result {
  margin-top:10px;
  color:#ff9800;
  font-weight:bold;
}

.summary {
  margin-top:20px;
  padding:15px;
  background:#111;
}
</style>
</head>

<body>

<header>
<select id="cat"></select>
<select id="eq"></select>

<div id="days"></div>
</header>

<div id="main"></div>

<div class="summary" id="summary"></div>

<script>

const DAYS=["日","月","火","水","木","金","土"];
let FILTER=[1,1,1,1,1,1,1];
let DATA;

// 曜日UI
DAYS.forEach((d,i)=>{
  const s=document.createElement("span");
  s.textContent=d;
  s.className="on";
  s.onclick=()=>{
    FILTER[i]=1-FILTER[i];
    s.className=FILTER[i]?"on":"off";
    renderCurrent();
  };
  document.getElementById("days").appendChild(s);
});

// JSON
fetch("kaisyu.json").then(r=>r.json()).then(d=>{
  DATA=d;
  init();
});

let current=null;

function init(){

  const cSel=document.getElementById("cat");
  const eSel=document.getElementById("eq");

  Object.keys(DATA).forEach(c=>cSel.add(new Option(c,c)));

  cSel.onchange=()=>{
    eSel.innerHTML="";
    Object.keys(DATA[cSel.value]).forEach(n=>{
      const eq=DATA[cSel.value][n];
      if(eq.info["10"] && eq.info["10"].some(r=>r.result)){
        eSel.add(new Option(n,n));
      }
    });
  };

  cSel.onchange();

  eSel.onchange=()=>{
    current=eSel.value;
    renderCurrent();
  };
}

function renderCurrent(){
  if(!current)return;

  const eq=find(current);
  const main=document.getElementById("main");
  main.innerHTML="";

  totalMat={};
  totalRes=[0,0,0,0];

  drawStage(main, eq, "0", "★0～5");
  arrow(main);
  drawStage(main, eq, "6", "★6～9");
  arrow(main);
  drawStage(main, eq, "10", "★10", true);

  renderSummary();
}

function drawStage(root, eq, key, title, isUpdate=false){

  const list=eq.info[key];
  if(!list)return;

  list.forEach(r=>{

    if(!matchDay(r.youbi)) return;

    const div=document.createElement("div");
    div.className="stage";

    let mats="";
    (r.soubi||[]).forEach(s=>{
      mats+=`${s[0]}×${s[1]} `;
      totalMat[s[0]]=(totalMat[s[0]]||0)+s[1];
    });

    if(eq.resource){
      totalRes = totalRes.map((v,i)=>v+eq.resource[i]);
    }

    div.innerHTML=`
      <h3>${title}</h3>
      艦: ${joinUnique(r.ship)}<br>
      <div class="materials">素材: ${mats}</div>
      <div class="resources">資源: ${eq.resource.join(" / ")}</div>
      ${isUpdate && r.result ? `<div class="result">[更新] → ${r.result}</div>` : ""}
    `;

    root.appendChild(div);
  });
}

function arrow(root){
  const a=document.createElement("div");
  a.className="arrow";
  a.textContent="↑";
  root.appendChild(a);
}

function renderSummary(){

  let matHTML = Object.entries(totalMat)
    .map(([k,v])=>`${k} × ${v}`)
    .join("<br>");

  let resHTML = `
    燃料 ${totalRes[0]}<br>
    弾薬 ${totalRes[1]}<br>
    鋼材 ${totalRes[2]}<br>
    ボーキ ${totalRes[3]}<br>
  `;

  document.getElementById("summary").innerHTML=`
    <h3>合計</h3>
    <b>素材</b><br>${matHTML}<br><br>
    <b>資源</b><br>${resHTML}
  `;
}

function matchDay(arr){
  return arr.some((v,i)=>v&&FILTER[i]);
}

function joinUnique(arr){
  return [...new Set(arr)].join(" / ");
}

function find(name){
  for(const c in DATA){
    if(DATA[c][name]) return DATA[c][name];
  }
}

</script>
</body>
</html>
